<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바디 리컴포지션</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#7C5CFC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="리컴포지션">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#F5F6FC; --panel:#FFFFFF; --panel-alt:#F7F8FD; --border:#E7E9F6; --border-soft:#EFF0F9;
  --text:#17182B; --text-dim:#6E7191; --text-faint:#A6A9C4;

  --font-display:'Space Grotesk',sans-serif; --font-body:'Pretendard',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --display-weight:700;

  --grad-1:linear-gradient(120deg,#7C5CFC 0%,#17D9B4 100%);

  --c-weight:#4C8DFF; --c-muscle:#17D9B4; --c-fat:#FF6B7A; --c-fatpct:#7C5CFC; --c-goalline:#FF6B7A; --c-grid:#EFF0F9;
  --c-gauge-from:#7C5CFC; --c-gauge-to:#17D9B4; --c-goalmark:#FF6B7A; --c-track:#EFF0F9;
  --c-ring-from:#7C5CFC; --c-ring-good:#17D9B4; --c-ring-warn:#FFB648;
  --c-good:#0EBB9A; --c-good-soft:rgba(23,217,180,0.14);
  --c-warn:#F04D5E; --c-warn-soft:rgba(255,107,122,0.14);
  --c-neutral:#2E6FE0; --c-neutral-soft:rgba(76,141,255,0.14);
  --c-accent:#7C5CFC; --c-accent-strong:#F04D5E;
  --c-bonus:#F5A623; --c-bonus-soft:rgba(245,166,35,0.16);

  --gauge-value-color:#7C5CFC;
  --eyebrow-bg:linear-gradient(120deg, rgba(124,92,252,0.12), rgba(23,217,180,0.12)); --eyebrow-text:#5B3DF0;
  --brand-mark-bg:var(--grad-1); --brand-mark-fg:#FFFFFF; --btn-primary-fg:#FFFFFF;
  --accent-strong-text:#5B3DF0; --sec-num-color:#A6A9C4;
  --backdrop:rgba(23,24,43,0.45);

  --radius:18px; --radius-lg:24px; --radius-sm:12px; --radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(23,24,43,0.04), 0 1px 1px rgba(23,24,43,0.03);
  --shadow-md:0 8px 24px rgba(88,70,220,0.08);
  --shadow-glow:0 12px 32px rgba(124,92,252,0.18);
}
.gauge-value{background:var(--grad-1); -webkit-background-clip:text; background-clip:text; color:transparent;}
.gauge-value .gauge-unit{-webkit-text-fill-color:var(--text-faint); color:var(--text-faint);}

.blob{position:fixed; border-radius:50%; filter:blur(70px); opacity:0.35; z-index:0; pointer-events:none;}
.blob-1{width:420px; height:420px; background:#7C5CFC; top:-160px; right:-120px;}
.blob-2{width:360px; height:360px; background:#17D9B4; top:280px; left:-160px; opacity:0.22;}
.blob-3{width:300px; height:300px; background:#FF6B7A; bottom:-100px; right:10%; opacity:0.18;}

*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased;}
body{padding-bottom:80px; position:relative;}
button,input{font-family:inherit;}
.mono{font-family:var(--font-mono); font-variant-numeric:tabular-nums;}
.dim{color:var(--text-faint);}
.p-dim{font-size:13px; color:var(--text-dim); line-height:1.75; margin:0 0 16px;}

.shell{max-width:1000px; margin:0 auto; padding:0 24px; position:relative; z-index:1;}

header.topbar{padding:24px 0 4px;}
.topbar-inner{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;}
.brand{display:flex; align-items:center; gap:11px;}
.brand-mark{width:36px; height:36px; border-radius:var(--radius-sm); background:var(--brand-mark-bg); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-glow); flex-shrink:0; color:var(--brand-mark-fg);}
.brand h1{font-family:var(--font-display); font-weight:var(--display-weight,700); font-size:19px; letter-spacing:-.01em;}
.brand span{color:var(--text-faint); font-size:11.5px; display:block; margin-top:-1px; font-weight:500;}
.topbar-actions{display:flex; gap:8px;}

.btn{border:1px solid var(--border); background:var(--panel); color:var(--text); padding:10px 18px; border-radius:var(--radius-pill); font-size:13px; cursor:pointer; font-weight:600; transition:all .15s ease; display:inline-flex; align-items:center; gap:6px; box-shadow:var(--shadow-sm);}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-md);}
.btn-primary{background:var(--brand-mark-bg); color:var(--btn-primary-fg); border:none; box-shadow:var(--shadow-glow);}
.btn-primary:hover{filter:brightness(1.05); transform:translateY(-1px);}
.btn-ghost{background:transparent; border-color:transparent; color:var(--text-dim); box-shadow:none;}
.btn-ghost:hover{background:var(--panel-alt); color:var(--text); box-shadow:none; transform:none;}
.btn-sm{padding:8px 14px; font-size:12.5px;}
.btn.danger{color:var(--c-warn); border-color:var(--c-warn-soft);}
.btn-row{display:flex; gap:8px; flex-wrap:wrap;}
.sync-badge{font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:var(--radius-pill); white-space:nowrap;}
.sync-badge-progress{background:var(--c-neutral-soft); color:var(--c-neutral);}
.sync-badge-done{background:var(--c-good-soft); color:var(--c-good);}
.sync-badge-error{background:var(--c-warn-soft); color:var(--c-warn);}

nav.tabs{display:flex; gap:6px; padding:16px 0 6px; flex-wrap:wrap;}
nav.tabs button{background:transparent; border:none; color:var(--text-dim); font-size:13.5px; font-weight:600; padding:8px 15px; border-radius:var(--radius-pill); transition:.15s;}
nav.tabs button.active{background:var(--panel); color:var(--accent-strong-text); box-shadow:var(--shadow-sm);}
nav.tabs button:hover:not(.active){color:var(--text);}

main{padding-top:12px; display:flex; flex-direction:column; gap:26px;}

.card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow-sm);}
.section-label{font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-faint); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.section-label.good{color:var(--c-good);}
.sec-num{display:none; font-family:var(--font-mono); font-size:11px; color:var(--sec-num-color); border:1px solid var(--border); border-radius:4px; padding:1px 6px;}

/* HERO */
.hero{position:relative; overflow:hidden; padding:34px 30px 28px; border-radius:var(--radius-lg); box-shadow:var(--shadow-md);}
.hero-eyebrow{font-size:12px; letter-spacing:.02em; color:var(--eyebrow-text); font-weight:700; margin-bottom:14px; display:inline-flex; align-items:center; gap:7px; background:var(--eyebrow-bg); padding:5px 12px 5px 10px; border-radius:var(--radius-pill);}
.hero-eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--c-gauge-from);}
.hero-grid{display:grid; grid-template-columns:1fr; gap:26px; align-items:center;}
@media(min-width:760px){.hero-grid{grid-template-columns:280px 1fr;}}
.hero-figure{text-align:center;}
.gauge-value{font-family:var(--font-display); font-weight:var(--display-weight,700); font-size:44px; letter-spacing:-.02em; line-height:1; margin-top:-58px; color:var(--gauge-value-color);}
.gauge-unit{font-size:20px; color:var(--text-faint);}
.gauge-sub{color:var(--text-dim); font-size:12.5px; margin-top:8px;}
.gauge-legend{display:flex; gap:16px; margin-top:12px; font-size:11px; color:var(--text-faint); justify-content:center;}
.legend-dot{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px;}
.legend-dot-progress{background:var(--c-gauge-to);}
.legend-dot-goal{background:var(--c-goalmark);}
.gauge-mark-label{font-family:var(--font-display); font-weight:700; fill:var(--c-goalmark);}

.hero-side{display:flex; flex-direction:column; gap:0;}
.hero-stat{display:flex; align-items:baseline; justify-content:space-between; padding:11px 2px; border-bottom:1px solid var(--border-soft);}
.hero-stat:last-child{border-bottom:none;}
.hero-stat .l{color:var(--text-dim); font-size:13px;}
.hero-stat .v{font-family:var(--font-mono); font-size:16px; font-weight:600;}
.hero-heading{font-family:var(--font-display); font-weight:var(--display-weight,700); font-size:19px; margin-bottom:18px;}

.hero-goals{display:grid; grid-template-columns:1fr; gap:12px; margin-top:24px; padding-top:22px; border-top:1px solid var(--border-soft);}
@media(min-width:640px){.hero-goals{grid-template-columns:1fr 1fr;}}
.hero-goal-item{background:var(--panel-alt); border-radius:var(--radius-sm); padding:14px 16px;}
.hg-top{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:9px;}
.hg-label{font-size:13px; font-weight:700; color:var(--text);}
.hg-status{font-size:11px; font-weight:700; padding:3px 10px; border-radius:var(--radius-pill); background:var(--c-warn-soft); color:var(--c-warn); white-space:nowrap;}
.hg-status.done{background:var(--c-good-soft); color:var(--c-good);}
.hg-bar{height:7px; border-radius:99px; background:var(--c-track); overflow:hidden;}
.hg-fill{height:100%; border-radius:99px; background:linear-gradient(90deg, var(--c-gauge-from), var(--c-gauge-to));}
.hg-foot{display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-faint); margin-top:7px; font-family:var(--font-mono);}
.hg-detail{font-size:11.5px; color:var(--text-dim); margin-top:9px; padding-top:9px; border-top:1px dashed var(--border-soft); line-height:1.55;}
.hg-detail b{color:var(--c-warn); font-family:var(--font-mono);}

/* INSIGHTS */
.insight-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
@media(min-width:720px){.insight-grid{grid-template-columns:repeat(3,1fr);}}
.insight{padding:16px;}
.insight .ic-label{display:flex; align-items:center; gap:6px; font-size:11px; font-weight:600; color:var(--text-faint); margin-bottom:10px;}
.insight .ic-icon{width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.insight .ic-value{font-family:var(--font-display); font-size:23px; font-weight:700;}
.insight .ic-sub{font-size:11.5px; color:var(--text-dim); margin-top:6px; line-height:1.5;}
.tone-good .ic-value{color:var(--c-good);} .tone-warn .ic-value{color:var(--c-warn);} .tone-neutral .ic-value{color:var(--c-neutral);}
.tone-good .ic-icon{background:var(--c-good-soft); color:var(--c-good);}
.tone-warn .ic-icon{background:var(--c-warn-soft); color:var(--c-warn);}
.tone-neutral .ic-icon{background:var(--c-neutral-soft); color:var(--c-neutral);}
.insight.tone-warn{border-left:3px solid var(--c-warn); background:linear-gradient(90deg, var(--c-warn-soft), var(--panel) 40%);}
.insight.tone-good{border-left:3px solid var(--c-good);}

/* CHARTS */
.chart-grid{display:grid; grid-template-columns:1fr; gap:12px;}
@media(min-width:640px){.chart-grid{grid-template-columns:1fr 1fr;}}
.chart-card .ch-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;}
.ch-title{font-size:12px; font-weight:600; color:var(--text-dim);}
.ch-now{font-family:var(--font-mono); font-size:16px; font-weight:700;}
svg.chart{width:100%; height:120px; display:block;}
.chart-axis text, text.chart-axis{fill:var(--text-faint); font-size:9px; font-family:var(--font-mono);}

table.data-table{width:100%; border-collapse:collapse; font-size:13px;}
table.data-table th{text-align:right; font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--text-faint); padding:9px 10px; border-bottom:1px solid var(--border);}
table.data-table th:first-child, table.data-table td:first-child{text-align:left;}
table.data-table td{text-align:right; padding:7px 10px; font-family:var(--font-mono); border-bottom:1px solid var(--border-soft); color:var(--text-dim);}
table.data-table tr:hover td{color:var(--text); background:var(--panel-alt);}

.editable-cell{cursor:pointer; border-bottom:1px dotted var(--border); padding-bottom:1px;}
.editable-cell:hover{color:var(--accent-strong-text); border-bottom-color:var(--accent-strong-text);}
input.inline-edit-input{width:64px; background:var(--panel); border:1.5px solid var(--c-gauge-from); border-radius:6px; padding:3px 5px; color:var(--text); font-family:var(--font-mono); font-size:12.5px; text-align:right;}
.warn-text{color:var(--c-warn); font-weight:700;}
.good-text{color:var(--c-good); font-weight:700;}

.toggle-row{display:flex; align-items:center; gap:6px; color:var(--text-dim); font-size:13px; font-weight:600; background:none; border:none; padding:8px 2px; cursor:pointer;}
.toggle-row:hover{color:var(--accent-strong-text);}

/* LOG */
.week-block{margin-bottom:20px;}
.week-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
.week-title{font-size:13px; font-weight:700; color:var(--text); font-family:var(--font-display);}
.week-chips{display:flex; gap:6px; flex-wrap:wrap;}
.chip{font-size:11px; font-weight:600; padding:5px 11px; border-radius:var(--radius-pill); background:var(--panel-alt); color:var(--text-dim); border:1px solid var(--border-soft);}
.chip.good{background:var(--c-good-soft); color:var(--c-good); border-color:transparent;}
.chip.warn{background:var(--c-warn-soft); color:var(--c-warn); border-color:transparent;}

.day-row{display:grid; grid-template-columns:56px 1fr; gap:14px; padding:14px 4px; border-bottom:1px solid var(--border-soft);}
.day-row:last-child{border-bottom:none;}
.day-date{font-family:var(--font-display); color:var(--text); font-size:13px; font-weight:700; padding-top:2px;}
.day-date .dow{display:block; font-size:10.5px; color:var(--text-faint); font-weight:500; margin-top:2px;}
.day-cols{display:grid; grid-template-columns:1fr; gap:10px;}
@media(min-width:640px){.day-cols{grid-template-columns:1.1fr 1fr 1fr;}}
.day-col{font-size:12.5px; line-height:1.6; color:var(--text);}
.day-col .k{display:flex; align-items:center; gap:5px; color:var(--text-faint); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;}
.day-col .empty{color:var(--text-faint); font-size:12px;}
.delta{font-family:var(--font-mono); font-size:11px; margin-left:6px; font-weight:600;}
.delta.up{color:var(--c-warn);} .delta.down{color:var(--c-good);}
.badge{display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:var(--radius-pill); margin-left:5px;}
.badge.hit{background:var(--c-good-soft); color:var(--c-good);}
.badge.miss{background:var(--c-warn-soft); color:var(--c-warn);}

/* GOALS */
.ring-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px;}
@media(max-width:560px){.ring-grid{grid-template-columns:1fr;}}
.ring-card{display:flex; flex-direction:column; align-items:center; padding:22px 10px; background:var(--panel-alt); border-radius:var(--radius);}
.ring-label{font-size:13px; font-weight:600; color:var(--text); margin-top:12px;}
.ring-status{margin-top:10px; font-size:12px; font-weight:700; padding:5px 13px; border-radius:var(--radius-pill);}
.ring-status.done{background:var(--c-good-soft); color:var(--c-good);}
.ring-status.pending{background:var(--c-warn-soft); color:var(--c-warn);}
.ring-num{font-family:var(--font-display); font-weight:700; fill:var(--text);}

.calc-table td, .calc-table th{padding:10px 10px;}
.calc-table td:first-child{color:var(--text); font-weight:600; text-align:left;}

.guide-list{display:flex; flex-direction:column; gap:14px;}
.guide-item{display:flex; gap:13px; font-size:13.5px; line-height:1.7; color:var(--text-dim);}
.guide-num{font-family:var(--font-display); font-weight:700; color:var(--c-accent); flex-shrink:0; font-size:13px; padding-top:1px;}

/* MODAL */
.modal-backdrop{position:fixed; inset:0; background:var(--backdrop); backdrop-filter:blur(2px); z-index:50; display:flex; align-items:flex-end; justify-content:center;}
@media(min-width:640px){.modal-backdrop{align-items:center;}}
.modal{background:var(--panel); width:100%; max-width:440px; max-height:90vh; overflow-y:auto; border-radius:var(--radius-lg) var(--radius-lg) 0 0; box-shadow:var(--shadow-md);}
@media(min-width:640px){.modal{border-radius:var(--radius-lg);}}
.modal-head{display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid var(--border-soft);}
.modal-head h3{font-family:var(--font-display); font-size:17px; font-weight:700;}
.modal-body{padding:20px; display:flex; flex-direction:column; gap:13px;}
.kind-tabs{display:flex; gap:6px;}
.kind-tabs button{flex:1; padding:10px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--panel); color:var(--text-dim); font-size:13px; font-weight:600;}
.kind-tabs button.active{background:var(--eyebrow-bg); border-color:var(--c-gauge-from); color:var(--accent-strong-text);}
.dropzone{border:1.5px dashed var(--border); border-radius:var(--radius); padding:32px 10px; text-align:center; color:var(--text-dim); font-size:13px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:9px; cursor:pointer;}
.dropzone:hover{border-color:var(--c-gauge-from); color:var(--accent-strong-text); background:var(--panel-alt);}
.field{display:flex; flex-direction:column; gap:5px;}
.field label{font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint);}
.field input{background:var(--panel-alt); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; color:var(--text); font-size:13.5px; font-family:var(--font-mono);}
.field input:focus{outline:none; border-color:var(--c-gauge-from);}
.btn-save{background:var(--brand-mark-bg); color:var(--btn-primary-fg); border:none; border-radius:var(--radius-sm); padding:12px; font-weight:700; font-size:14px; box-shadow:var(--shadow-glow);}
.link-btn{background:none; border:none; color:var(--text-dim); text-decoration:underline; font-size:12.5px; text-underline-offset:3px; font-weight:600;}
.link-btn:hover{color:var(--accent-strong-text);}
.spin{animation:spin .9s linear infinite; display:inline-block; color:var(--c-gauge-from);}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-box{display:flex; flex-direction:column; align-items:center; gap:10px; padding:36px 0; color:var(--text-dim);}
.msg-error{color:var(--c-warn); font-size:13px; font-weight:600;}
.msg-good{color:var(--c-good); font-size:13px; font-weight:600;}
.note-box{font-size:11.5px; color:var(--text-dim); line-height:1.65; background:var(--panel-alt); border-radius:var(--radius-sm); padding:12px 14px;}
.empty-state{text-align:center; padding:70px 20px; color:var(--text-faint); font-size:13.5px;}

.ai-note-body{font-size:13.5px; line-height:1.75; color:var(--text); white-space:normal;}
textarea.ai-textarea{background:var(--panel-alt); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; color:var(--text); font-size:13px; font-family:var(--font-body); line-height:1.6; width:100%; min-height:140px; resize:vertical;}
textarea.ai-textarea:focus{outline:none; border-color:var(--c-gauge-from);}

.alert-list{display:flex; flex-direction:column; gap:12px;}
.alert-item{display:flex; gap:12px; padding:13px; border-radius:var(--radius-sm); background:var(--panel-alt); border-left:3px solid transparent;}
.alert-item.tone-warn-item{border-left-color:var(--c-warn); background:linear-gradient(90deg, var(--c-warn-soft), var(--panel-alt) 45%);}
.alert-item.tone-good-item{border-left-color:var(--c-good);}
.alert-icon{width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.alert-icon.tone-good{background:var(--c-good-soft); color:var(--c-good);}
.alert-icon.tone-warn{background:var(--c-warn-soft); color:var(--c-warn);}
.alert-icon.tone-neutral{background:var(--c-neutral-soft); color:var(--c-neutral);}
.alert-title{font-size:13.5px; font-weight:700; margin-bottom:4px;}
.alert-title.tone-good{color:var(--c-good);} .alert-title.tone-warn{color:var(--c-warn);} .alert-title.tone-neutral{color:var(--c-neutral);}
.alert-detail{font-size:12.5px; color:var(--text-dim); line-height:1.6;}

.sw-grid{display:grid; grid-template-columns:1fr; gap:12px;}
@media(min-width:640px){.sw-grid{grid-template-columns:1fr 1fr;}}

.sw-detail{font-size:12px; color:var(--text-dim); line-height:1.55;}

.recovery-item .rc-icon{font-size:18px; margin-bottom:4px; display:flex; align-items:center; justify-content:center; gap:5px;}
.part-dot{display:inline-block; width:10px; height:10px; border-radius:50%; vertical-align:middle;}
.recovery-item .rc-icon .part-dot{width:12px; height:12px;}
.recovery-item .rc-part{font-size:13px; font-weight:700; color:var(--text);}
.recovery-item .rc-status{font-size:11px; font-weight:700; margin-top:5px; padding:2px 8px; border-radius:999px; display:inline-block;}
.recovery-item .rc-days{font-size:10.5px; color:var(--text-faint); margin-top:5px; font-family:var(--font-mono);}
.recovery-item.status-resting .rc-status{background:var(--c-warn-soft); color:var(--c-warn);}
.recovery-item.status-ready .rc-status{background:var(--c-neutral-soft); color:var(--c-neutral);}
.recovery-item.status-recovered .rc-status{background:var(--c-good-soft); color:var(--c-good);}
.recovery-item.status-overdue .rc-status{background:var(--c-warn-soft); color:var(--c-warn);}
.recovery-item.status-unknown .rc-status{background:var(--panel); color:var(--text-faint);}

.plan-cell.solo{margin-top:0;}

@media(max-width:480px){.plan-grid{grid-template-columns:repeat(7,1fr); gap:3px;} .plan-label{display:none;}}

.ex-rows{display:flex; flex-direction:column; gap:6px;}
.ex-row{display:grid; grid-template-columns:1.6fr 1fr 0.7fr 0.7fr 0.8fr auto; gap:5px; align-items:center;}

        // 아닌 경우, 즉 공백/구두점/시작/끝) 매칭하도록 경계 검사 추가 — "등록/등급/평등" 등은

function parseSteps(text){
  if(!text) return null;
  const m = text.match(/([\d,]+)\s*걸음/);
  if(!m) return null;
  const n = Number(m[1].replace(/,/g,''));
  return isNaN(n) ? null : n;
}
// 그날 인클라인 트레드밀 운동기록에 걸음수가 함께 적혀있으면, 그건 이미 일일 총 걸음수 안에 포함돼 있으므로
// NEAT(순수 일상활동) 계산 시 총 걸음수에서 빼서 중복을 제거합니다.
function computeStepBreakdown(stepRec, workouts){
  const dayWorkouts = workouts.filter(w => w.date === stepRec.date);
  let treadmillSteps = 0;
  dayWorkouts.forEach(w => {
    const text = `${w.name||''} ${w.note||''}`;
    if(isInclineEntry(w)){
      const s = parseSteps(text);
      if(s) treadmillSteps += s;
    }
  });
  const neat = Math.max(0, stepRec.steps - treadmillSteps);
  return {total: stepRec.steps, treadmillSteps, neat};
}

function parseHR(text){
  if(!text) return null;
  const idx = text.indexOf('트레드밀');
  if(idx >= 0){
    const after = text.slice(idx);
    const m1 = after.match(/평균\s*심박\s*(\d+)/) || after.match(/(\d+)\s*bpm/i);
    if(m1) return Number(m1[1]);
  }
  const m = text.match(/평균\s*심박\s*(\d+)/) || text.match(/(\d+)\s*bpm/i);
  return m ? Number(m[1]) : null;
}
function parseDurationMin(text){
  if(!text) return null;
  const idx = text.indexOf('트레드밀');
  const search = idx>=0 ? text.slice(idx) : text;
  // 1순위: 괄호 안 (MM:SS) — "시작~종료(소요시간)" 표기에서 실제 소요시간을 최우선 인식
  let m = search.match(/\((\d+):(\d+)\)/);
  if(m) return Number(m[1]) + Number(m[2])/60;
  // 2순위(2026-07-16 추가): H:MM:SS 뒤에 곧바로 "평균속도"가 오는 경우 — PT 총시간(H:MM:SS)과
  // 트레드밀 소요시간이 한 노트에 같이 있을 때(예: "기구운동 1:04:11, ... · 트레드밀 38:42, 평균속도...")
  // "평균속도" 문맥이 붙은 쪽이 진짜 소요시간이므로 이걸 최우선으로 확인
  m = search.match(/(\d+):(\d+):(\d+)\s*(?:\([^)]*\))?\s*,\s*평균속도/);
  if(m) return Number(m[1])*60 + Number(m[2]) + Number(m[3])/60;
  // 3순위: MM:SS 뒤에 곧바로 "평균속도"가 오는 경우 — 기상 시각(시계)이 먼저 나와도
  // 소요시간은 항상 "평균속도" 바로 앞에 위치하므로 시계 시각과 안전하게 구분됨.
  // (실제 발생 사례: 7/15·7/16 공복 세션 "06:32"/"06:10" 기상시각 오인식, 7/11 PT총시간 오인식)
  m = search.match(/(\d+):(\d+)\s*(?:\([^)]*\))?\s*,\s*평균속도/);
  if(m) return Number(m[1]) + Number(m[2])/60;
  // 4순위: H:MM:SS (평균속도 문맥 없이 단독으로 있는 경우의 fallback)
  m = search.match(/(\d+):(\d+):(\d+)/);
  if(m) return Number(m[1])*60 + Number(m[2]) + Number(m[3])/60;
  // 5순위: "공복/기상직후/오전/오후" 뒤에 바로 오는 MM:SS는 시계 시각일 가능성이 높으므로 건너뛰고
  // 그 뒤에 나오는 다음 MM:SS 패턴을 소요시간 후보로 사용
  const clockMatch = search.match(/(?:공복|기상직후|오전|오후)\s*(\d+):(\d+)/);
  if(clockMatch){
    const after = search.slice(search.indexOf(clockMatch[0]) + clockMatch[0].length);
    m = after.match(/(\d+):(\d+)(?!:)/);
    if(m) return Number(m[1]) + Number(m[2])/60;
  }
  // 6순위(최후 fallback): 첫 번째 MM:SS 패턴
  m = search.match(/(\d+):(\d+)(?!:)/);
  if(m) return Number(m[1]) + Number(m[2])/60;
  m = search.match(/약?\s*(\d+)\s*분/);
  if(m) return Number(m[1]);
  return null;
}
function isInclineEntry(w){
  const text = `${w.name||''} ${w.part||''} ${w.note||''}`;
  return text.includes('인클라인') || text.includes('트레드밀');
}
// 목표 심박존(105~125bpm)은 이 날짜에 처음 설정됨 — 그 이전 세션은 기준 미적용(참고용)으로만 표시
const HR_TARGET_SET_DATE = '2026-07-12';

function computeInclineHistory(workouts){
  return workouts.filter(isInclineEntry).map(w => {
    const text = `${w.name||''} ${w.note||''}`;
    const distanceKm = parseKm(text);
    const avgHR = parseHR(text);
    const durationMin = parseDurationMin(text);
    const isPreTarget = w.date < HR_TARGET_SET_DATE;
    const deviation = avgHR===null ? null : (avgHR < CARDIO_HR_TARGET.min ? CARDIO_HR_TARGET.min-avgHR : avgHR > CARDIO_HR_TARGET.max ? avgHR-CARDIO_HR_TARGET.max : 0);
    let verdict, tone;
    if(avgHR===null){ verdict='심박 기록 없음'; tone='neutral'; }
    else if(isPreTarget){ verdict='목표 설정 전(참고용)'; tone='neutral'; }
    else if(avgHR >= CARDIO_HR_TARGET.min && avgHR <= CARDIO_HR_TARGET.max){ verdict='목표존 적중'; tone='good'; }
    else if(avgHR < CARDIO_HR_TARGET.min){ verdict='목표존보다 낮음(강도↑ 여지)'; tone='neutral'; }
    else { verdict=`목표존 초과 (+${avgHR-CARDIO_HR_TARGET.max}bpm)`; tone='warn'; }
    return {date:w.date, distanceKm, calories:w.calories, avgHR, durationMin, verdict, tone, isPreTarget, deviation};
  }).sort((a,b)=>b.date.localeCompare(a.date));
}

function parseVolume(v){
  if(v===null||v===undefined) return 0;
  if(typeof v==='number') return v;
  const n = Number(String(v).replace(/[^0-9.]/g,''));
  return isNaN(n) ? 0 : n;
}
function parseKm(text){
  if(!text) return 0;
  const matches = [...text.matchAll(/(\d+(\.\d+)?)\s*km(?!\/h)/g)];
  return matches.reduce((s,m)=>s+parseFloat(m[1]),0);
}
function daysAgoList(n){
  const today = todayISO();
  return Array.from({length:n}, (_,i) => { const d=new Date(today+'T00:00:00'); d.setDate(d.getDate()-i); return toLocalISO(d); });
}

function computeWorkoutKPICards(workouts){
  const last7 = daysAgoList(7);
  const last14 = daysAgoList(14);
  const w7 = workouts.filter(w => last7.includes(w.date));
  const wPrev7 = workouts.filter(w => last14.includes(w.date) && !last7.includes(w.date));

  const sessionDays7 = daysAgoList(7).filter(d => { const t=classifyDayType(workouts,d); return t && t.type!=='휴식'; }).length;
  const vol7 = w7.reduce((s,w)=>s+parseVolume(w.volume),0);
  const coverage7 = new Set(w7.flatMap(w=>inferPartsForEntry(w))).size;
  const riskCount = workouts.filter(w => isNeckRisky(`${w.name||''} ${w.part||''} ${w.note||''}`)).length;
  const sortedW = [...workouts].sort((a,b)=>b.date.localeCompare(a.date));
  const lastDate = sortedW[0] ? sortedW[0].date : null;
  const daysSinceLast = lastDate ? Math.round((new Date(todayISO()+'T00:00:00') - new Date(lastDate+'T00:00:00'))/86400000) : null;

  const inclineRecent = computeInclineHistory(workouts).filter(r => !r.isPreTarget && r.avgHR!==null);
  const inZoneCount = inclineRecent.filter(r=>r.tone==='good').length;
  const inclineCardValue = inclineRecent.length ? `${inZoneCount}/${inclineRecent.length}` : '—';
  const inclineCardSub = inclineRecent.length
    ? `목표(${HR_TARGET_SET_DATE}) 설정 후 세션 중 목표존(${CARDIO_HR_TARGET.min}-${CARDIO_HR_TARGET.max}bpm) 적중`
    : `목표(${CARDIO_HR_TARGET.min}-${CARDIO_HR_TARGET.max}bpm) 설정 후 세션 대기 중`;
  const inclineCardTone = !inclineRecent.length ? 'neutral' : (inZoneCount===inclineRecent.length ? 'good' : 'warn');

  const volPrev7Sum = wPrev7.reduce((s,w)=>s+parseVolume(w.volume),0);
  const volChangePct = volPrev7Sum>0 ? Math.round((vol7-volPrev7Sum)/volPrev7Sum*100) : null;

  const allVolEntries = workouts.map(w=>({date:w.date, vol:parseVolume(w.volume), parts:inferPartsForEntry(w)})).filter(e=>e.vol>0);
  const maxVol = allVolEntries.length ? Math.max(...allVolEntries.map(e=>e.vol)) : 0;
  const prEntry = allVolEntries.find(e=>e.vol===maxVol);
  const prRecent = prEntry && last14.includes(prEntry.date);

  return [
    {icon:'award', label:'이번주 운동일수', value:`${sessionDays7}일`, sub:'최근 7일 기준', tone: sessionDays7>=3?'good':'warn'},
    {icon:'dumbbell', label:'이번주 총 볼륨', value:`${vol7.toLocaleString()}kg`, sub: wPrev7.length ? `지난 7일 대비 ${vol7 >= volPrev7Sum ? '증가' : '감소'}` : '비교 데이터 부족', tone:'neutral'},
    {icon:'target', label:'부위 커버리지', value:`${coverage7}/6`, sub:'최근 7일 동안 자극된 부위 수', tone: coverage7>=4?'good':(coverage7>=2?'neutral':'warn')},
    {icon: inclineCardTone==='warn'?'up':'down', label:'인클라인 트레드밀 심박존 준수', value: inclineCardValue, sub: inclineCardSub, tone: inclineCardTone},
    {icon: volChangePct===null?'target':(volChangePct>=0?'up':'down'), label:'주간 볼륨 변화율', value: volChangePct===null?'—':`${volChangePct>0?'+':''}${volChangePct}%`, sub: volChangePct===null?'비교 데이터 부족':`지난주 ${volPrev7Sum.toLocaleString()}kg → 이번주 ${vol7.toLocaleString()}kg`, tone: volChangePct===null?'neutral':(volChangePct>=0?'good':'warn')},
    {icon:'award', label:'역대 최고 볼륨(PR)', value: prEntry?`${prEntry.vol.toLocaleString()}kg`:'—', sub: prEntry?`${prEntry.date}${prEntry.parts.length?' · '+prEntry.parts.join('/'):''}${prRecent?' · 최근 14일 내 신기록 🔥':''}`:'기록 없음', tone: prRecent?'good':'neutral'},
  ];
}

function computeWorkoutInsights(workouts){
  const insights = [];
  if(workouts.length===0) return insights;
  const last21 = daysAgoList(21);
  const w21 = workouts.filter(w=>last21.includes(w.date));

  // 1) 부위 밸런스 (21일 기준 — KPI카드의 '7일 커버리지'와는 다른 시야)
  const partCount = Object.fromEntries(BODY_PARTS.map(p=>[p,0]));
  w21.forEach(w => inferPartsForEntry(w).forEach(p => { if(partCount[p]!==undefined) partCount[p]++; }));
  const sortedParts = BODY_PARTS.map(p=>({p,c:partCount[p]})).sort((a,b)=>a.c-b.c);
  const weakest = sortedParts[0], strongest = sortedParts[sortedParts.length-1];
  if(weakest.c===0){
    insights.push({tone:'warn', title:`${weakest.p} 최근 3주간 미자극`, detail:`최근 21일 동안 ${weakest.p} 운동 기록이 없어요. 다른 부위(${strongest.p} ${strongest.c}회)와 균형을 맞출 필요가 있어요.`});
  } else if(weakest.c < strongest.c - 2){
    insights.push({tone:'neutral', title:`${weakest.p} 상대적으로 적게 자극됨`, detail:`최근 21일 기준 ${strongest.p} ${strongest.c}회 대비 ${weakest.p}는 ${weakest.c}회로 격차가 있어요.`});
  } else {
    insights.push({tone:'good', title:'부위별 밸런스 양호', detail:`최근 21일 동안 6개 부위가 비교적 고르게 자극됐어요(최소 ${weakest.p} ${weakest.c}회 ~ 최대 ${strongest.p} ${strongest.c}회).`});
  }

  // 2) 회복 룰(48h) 준수 여부
  let violations = 0;
  const byPartDates = {};
  [...workouts].sort((a,b)=>a.date.localeCompare(b.date)).forEach(w => {
    inferPartsForEntry(w).forEach(p => {
      if(byPartDates[p]){
        const gap = (new Date(w.date+'T00:00:00') - new Date(byPartDates[p]+'T00:00:00'))/86400000;
        if(gap < 2 && gap > 0) violations++;
      }
      byPartDates[p] = w.date;
    });
  });
  if(violations>0){
    insights.push({tone:'warn', title:'48시간 회복 원칙 위반 감지', detail:`같은 부위를 48시간 이내에 다시 자극한 사례가 ${violations}건 있었어요. 회복 시간을 좀 더 확보하는 걸 권장해요.`});
  } else {
    insights.push({tone:'good', title:'회복 간격 원칙 준수', detail:'기록상 모든 부위가 48시간 이상 간격을 두고 재자극됐어요 — 회복 관리가 잘 되고 있어요.'});
  }

  // 3) 목디스크 안전 준수
  const riskEntries = workouts.filter(w => isNeckRisky(`${w.name||''} ${w.part||''} ${w.note||''}`));
  if(riskEntries.length>0){
    const dates = riskEntries.slice(-3).map(w=>w.date.slice(5)).join(', ');
    insights.push({tone:'warn', title:'목디스크 위험 종목 감지', detail:`${dates} 기록에서 오버헤드프레스·바벨스쿼트 계열 종목이 확인됐어요. 이 종목들은 영구 제외 대상이라 PT와 다시 확인하는 걸 권장해요.`});
  } else {
    insights.push({tone:'good', title:'목디스크 안전 종목만 사용 중', detail:'최근 기록에서 오버헤드프레스·바벨스쿼트 등 위험 종목이 감지되지 않았어요.'});
  }

  // 4) 세션당 평균 볼륨(강도 밀도) 추이 — KPI카드의 '주간 총볼륨'과 달리, 세션 1회당 얼마나 알차게 채우는지를 봄
  const last14 = daysAgoList(14), last28 = daysAgoList(28);
  const recentSessions = workouts.filter(w=>last14.includes(w.date) && parseVolume(w.volume)>0);
  const priorSessions = workouts.filter(w=>last28.includes(w.date) && !last14.includes(w.date) && parseVolume(w.volume)>0);
  if(recentSessions.length && priorSessions.length){
    const recentAvg = recentSessions.reduce((s,w)=>s+parseVolume(w.volume),0)/recentSessions.length;
    const priorAvg = priorSessions.reduce((s,w)=>s+parseVolume(w.volume),0)/priorSessions.length;
    const diffPct = ((recentAvg-priorAvg)/priorAvg)*100;
    if(diffPct >= 15) insights.push({tone:'good', title:'세션당 평균 볼륨 향상', detail:`최근 2주 세션당 평균 ${Math.round(recentAvg).toLocaleString()}kg으로, 이전 2주(${Math.round(priorAvg).toLocaleString()}kg) 대비 ${fmt(diffPct,0)}% 늘었어요. 세션 하나하나가 더 알차졌어요.`});
    else if(diffPct <= -15) insights.push({tone:'warn', title:'세션당 평균 볼륨 하락', detail:`최근 2주 세션당 평균 ${Math.round(recentAvg).toLocaleString()}kg으로, 이전 2주(${Math.round(priorAvg).toLocaleString()}kg) 대비 ${fmt(Math.abs(diffPct),0)}% 줄었어요. 세션은 하는데 강도가 낮아졌을 수 있어요.`});
    else insights.push({tone:'neutral', title:'세션당 볼륨 밀도 유지', detail:`최근 2주 세션당 평균 ${Math.round(recentAvg).toLocaleString()}kg으로 이전과 비슷한 수준을 유지하고 있어요.`});
  }

  // 5) PT vs 자가운동 비중 추이 — 기록에 'PT' 표기가 있는 세션 비율 변화
  const ptRatio = (dates) => {
    const sessions = workouts.filter(w=>dates.includes(w.date) && parseVolume(w.volume)>0);
    if(!sessions.length) return null;
    const ptCount = sessions.filter(w=>`${w.name||''} ${w.note||''}`.includes('PT')).length;
    return {ratio: ptCount/sessions.length*100, total: sessions.length, ptCount};
  };
  const recentPT = ptRatio(last14), priorPT = ptRatio(daysAgoList(28).filter(d=>!last14.includes(d)));
  if(recentPT && priorPT){
    const diff = recentPT.ratio - priorPT.ratio;
    if(diff <= -20) insights.push({tone:'good', title:'자가운동 비중 증가', detail:`최근 2주 PT 세션 비중 ${fmt(recentPT.ratio,0)}%(${recentPT.ptCount}/${recentPT.total})로, 이전 2주(${fmt(priorPT.ratio,0)}%) 대비 자가운동 비중이 늘었어요 — 스스로 루틴을 잘 소화하고 있다는 신호예요.`});
    else if(diff >= 20) insights.push({tone:'neutral', title:'PT 세션 비중 증가', detail:`최근 2주 PT 세션 비중 ${fmt(recentPT.ratio,0)}%(${recentPT.ptCount}/${recentPT.total})로 이전 2주(${fmt(priorPT.ratio,0)}%)보다 늘었어요.`});
  }

  // 6) NEAT(걸음수) 추세 — 트레드밀 걸음 제외한 순수 일상활동
  if(state.steps && state.steps.length){
    const breakdowns = state.steps.map(s => ({...s, ...computeStepBreakdown(s, workouts)}));
    const recentN = breakdowns.filter(b=>last14.includes(b.date));
    const prior14 = daysAgoList(28).filter(d=>!last14.includes(d));
    const priorN = breakdowns.filter(b=>prior14.includes(b.date));
    if(recentN.length && priorN.length){
      const avgRecent = recentN.reduce((s,b)=>s+b.neat,0)/recentN.length;
      const avgPrior = priorN.reduce((s,b)=>s+b.neat,0)/priorN.length;
      const diffPct = ((avgRecent-avgPrior)/avgPrior)*100;
      if(diffPct <= -15) insights.push({tone:'warn', title:'NEAT(일상활동) 감소', detail:`최근 2주 평균 NEAT ${fmt(avgRecent,0)}보로 이전 2주(${fmt(avgPrior,0)}보) 대비 ${fmt(Math.abs(diffPct),0)}% 줄었어요. 운동은 그대로여도 하루 전체 소모량이 줄었을 수 있어요.`});
      else if(diffPct >= 15) insights.push({tone:'good', title:'NEAT(일상활동) 증가', detail:`최근 2주 평균 NEAT ${fmt(avgRecent,0)}보로 이전 2주(${fmt(avgPrior,0)}보) 대비 ${fmt(diffPct,0)}% 늘었어요.`});
    }
  }

  return insights.slice(0,6);
}

function recommendTodayParts(recovery){
  const eligible = recovery.filter(r => r.status==='recovered' || r.status==='overdue');
  eligible.sort((a,b) => (b.daysElapsed??999) - (a.daysElapsed??999));
  if(eligible.length===0){
    const readyOrResting = [...recovery].sort((a,b)=>(b.daysElapsed??999)-(a.daysElapsed??999));
    return readyOrResting.slice(0,1).map(r=>r.part);
  }
  return eligible.slice(0,2).map(r=>r.part);
}

function computeBodyPartRecovery(workouts, asOfDate, strictBefore){
  const asOfISO = asOfDate || todayISO();
  const asOf = new Date(asOfISO+'T00:00:00');
  return BODY_PARTS.map(part => {
    let lastDate = null;
    [...workouts].filter(w => strictBefore ? w.date < asOfISO : w.date <= asOfISO).sort((a,b)=>a.date.localeCompare(b.date)).forEach(w => {
      if(inferPartsForEntry(w).includes(part)) lastDate = w.date;
    });
    if(!lastDate) return {part, lastDate:null, daysElapsed:null, status:'unknown', label:'기록 없음'};
    const daysElapsed = Math.round((asOf - new Date(lastDate+'T00:00:00')) / 86400000);
    let status, label;
    if(daysElapsed < 2){ status='resting'; label='회복 중'; }
    else if(daysElapsed < 3){ status='ready'; label='회복 거의 완료'; }
    else if(daysElapsed <= 10){ status='recovered'; label='완전 회복'; }
    else { status='overdue'; label='장기 미자극'; }
    return {part, lastDate, daysElapsed, status, label};
  });
}

function loadArr(key, seed){
  try{
    const raw = localStorage.getItem(key);
    if(raw) return JSON.parse(raw);
    localStorage.setItem(key, JSON.stringify(seed));
    return seed;
  }catch(e){ return seed; }
}
function saveArr(key, arr){ try{ localStorage.setItem(key, JSON.stringify(arr)); }catch(e){ console.error('저장 실패', e); } }

  try{ const raw = localStorage.getItem(LS_KEYS.ainote); return raw ? JSON.parse(raw) : null; }catch(e){ return null; }

function fmtDateTime(iso){
  if(!iso) return null;
  const d = new Date(iso);
  if(isNaN(d.getTime())) return iso; // 이미 "YYYY-MM-DD" 같은 단순 문자열인 경우 그대로
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* =========================================================
   유틸
========================================================= */
const fmt = (n, d=1) => (n===null||n===undefined||isNaN(n)) ? '—' : Number(n).toFixed(d);
const dLabel = iso => { const [,m,d] = iso.split('-'); return `${Number(m)}/${Number(d)}`; };
const todayISO = () => {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
};
function toLocalISO(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
const dowLabel = iso => ['일','월','화','수','목','금','토'][new Date(iso+'T00:00:00').getDay()];
const esc = s => (s===null||s===undefined) ? '' : String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function sortedInbody(){ return [...state.inbody].sort((a,b)=>a.date.localeCompare(b.date)); }
function movingAverage(arr, key, win){
  return arr.map((row,i) => {
    const slice = arr.slice(Math.max(0,i-win+1), i+1);
    const vals = slice.map(r=>r[key]).filter(v=>v!==null&&v!==undefined);
    const avg = vals.reduce((a,b)=>a+b,0)/(vals.length||1);
    return {...row, [`${key}MA`]: avg};
  });
}
function isoWeekKey(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = (d.getDay()+6)%7;
  const monday = new Date(d); monday.setDate(d.getDate()-day);
  return toLocalISO(monday);
}

/* =========================================================
   SVG 차트 (색상은 CSS 변수 참조 → 테마별로 자동 변경)
========================================================= */
function lineChartSVG(data, key, colorVar, opts={}){
  const w=300,h=120,padL=34,padR=6,padT=15,padB=18;
  const vals = data.map(d=>d[key]).filter(v=>v!==null&&v!==undefined);
  if(vals.length===0) return `<svg class="chart" viewBox="0 0 ${w} ${h}"></svg>`;
  let min = Math.min(...vals), max = Math.max(...vals);
  const pad = opts.pad ?? ((max-min)*0.15 || 1);
  min -= pad; max += pad;
  const x = i => padL + (i/(data.length-1||1)) * (w-padL-padR);
  const y = v => padT + (1-(v-min)/(max-min||1)) * (h-padT-padB);

  const pts = data.map((d,i) => d[key]!=null ? [x(i), y(d[key])] : null);
  let pathD = '', areaD = '';
  let started = false;
  pts.forEach((p) => {
    if(!p) { started=false; return; }
    if(!started){ pathD += `M${p[0].toFixed(1)},${p[1].toFixed(1)} `; areaD += `M${p[0].toFixed(1)},${h-padB} L${p[0].toFixed(1)},${p[1].toFixed(1)} `; started=true; }
    else { pathD += `L${p[0].toFixed(1)},${p[1].toFixed(1)} `; areaD += `L${p[0].toFixed(1)},${p[1].toFixed(1)} `; }
  });
  const lastPt = [...pts].reverse().find(p=>p);
  if(lastPt) areaD += `L${lastPt[0].toFixed(1)},${h-padB} Z`;

  const gridY = [0,0.5,1].map(t => ({ y: padT + t*(h-padT-padB), val: max - t*(max-min) }));
  const yDecimals = (max-min) < 8 ? 1 : 0;
  const yTicks = gridY.map(g => `<text class="chart-axis" x="${padL-6}" y="${(g.y+3).toFixed(1)}" text-anchor="end">${fmt(g.val, yDecimals)}</text>`).join('');
  const gid = 'g'+key+Math.random().toString(36).slice(2,7);

  let goalLine = '';
  if(opts.goal!=null && opts.goal>=min && opts.goal<=max){
    goalLine = `<line x1="${padL}" x2="${w-padR}" y1="${y(opts.goal)}" y2="${y(opts.goal)}" style="stroke:var(--c-goalline)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>`;
  }

  let vlines = '';
  if(opts.vlines && opts.vlines.length){
    vlines = opts.vlines.map(vl => {
      const idx = data.findIndex(d => d.date >= vl.date);
      if(idx < 0) return '';
      const vx = x(idx);
      return `<line x1="${vx.toFixed(1)}" x2="${vx.toFixed(1)}" y1="${padT}" y2="${h-padB}" style="stroke:var(--c-goalmark)" stroke-width="1" stroke-dasharray="2 3" opacity="0.45"/>
        <text x="${vx.toFixed(1)}" y="${padT-2}" text-anchor="middle" class="chart-axis" font-size="8">${vl.label}</text>`;
    }).join('');
  }

  const nTicks = Math.min(5, data.length);
  const tickIdx = Array.from({length:nTicks}, (_,i)=>Math.round(i*(data.length-1)/(nTicks-1||1)));
  const xTicks = [...new Set(tickIdx)].map(i => `<text class="chart-axis" x="${x(i)}" y="${h-4}" text-anchor="middle">${dLabel(data[i].date)}</text>`).join('');

  return `<svg class="chart" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:var(${colorVar})" stop-opacity="0.28"/>
      <stop offset="100%" style="stop-color:var(${colorVar})" stop-opacity="0"/>
    </linearGradient></defs>
    ${gridY.map(g=>`<line x1="${padL}" x2="${w-padR}" y1="${g.y}" y2="${g.y}" style="stroke:var(--c-grid)" stroke-width="1"/>`).join('')}
    ${yTicks}
    ${goalLine}
    ${vlines}
    <path d="${areaD}" fill="url(#${gid})" stroke="none"/>
    <path d="${pathD}" fill="none" style="stroke:var(${colorVar})" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${xTicks}
  </svg>`;
}

function gaugeSVG(current, start, goals){
  const rangeMax = Math.max(start, 27), rangeMin = Math.min(...goals.map(g=>g.pct))-2.5;
  const cx=150, cy=140, r=98, sw=16;
  const angleFor = v => { const t = Math.min(1, Math.max(0, (rangeMax - v) / (rangeMax - rangeMin))); return Math.PI - t*Math.PI; };
  const pt = (ang, rad) => [cx + rad*Math.cos(ang), cy - rad*Math.sin(ang)];
  const arcPath = (a1, a2) => {
    const [x1,y1] = pt(a1,r), [x2,y2] = pt(a2,r);
    const large = Math.abs(a2-a1) > Math.PI ? 1 : 0;
    return `M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} ${a2>a1?0:1} ${x2.toFixed(1)},${y2.toFixed(1)}`;
  };
  const bgPath = arcPath(Math.PI, 0);
  const curAngle = angleFor(current);
  const progressPath = arcPath(Math.PI, curAngle);
  const gid = 'gaugegrad'+Math.random().toString(36).slice(2,7);

  const marks = goals.map(g => {
    const a = angleFor(g.pct);
    const [x1,y1] = pt(a, r);
    const [lx,ly] = pt(a, r+sw/2+12);
    const anchor = a < Math.PI/2-0.12 ? 'end' : (a > Math.PI/2+0.12 ? 'start' : 'middle');
    return `<line x1="${x1.toFixed(1)}" y1="${(y1-sw/2-3).toFixed(1)}" x2="${x1.toFixed(1)}" y2="${(y1+sw/2+3).toFixed(1)}" style="stroke:var(--c-goalmark)" stroke-width="2.4" transform="rotate(${-a*180/Math.PI+90} ${x1} ${y1})" />
      <text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="${anchor}" class="gauge-mark-label" font-size="11">${g.pct}%</text>`;
  }).join('');

  return `<svg viewBox="0 0 300 165" style="width:100%; max-width:260px; overflow:visible;">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" style="stop-color:var(--c-gauge-from)"/><stop offset="100%" style="stop-color:var(--c-gauge-to)"/>
    </linearGradient></defs>
    <path d="${bgPath}" fill="none" style="stroke:var(--c-track)" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="${progressPath}" fill="none" stroke="url(#${gid})" stroke-width="${sw}" stroke-linecap="round"/>
    ${marks}
  </svg>`;
}

/* ---------- 골격근 손실 평가 (체중 감소율 대비 근육 감소율, 정량 임상 데이터 기반) ----------
   근거: SURMOUNT-1 DEXA 하위연구 (Look M, et al. Diabetes Obes Metab 2025) — tirzepatide 투여군에서
   체중 -21.3%, 제지방량(lean mass) -10.9% (RCT, n=160, 정량 실측치).
   => 비율 = 제지방량 감소율 / 체중 감소율 = 10.9/21.3 = 0.51.
   주의: 이 0.51은 "골격근"이 아니라 근육+수분+장기+뼈를 포함하는 더 넓은 "제지방량" 기준이므로,
   골격근만 떼어보면 이보다 더 낮게 나오는 게 정상이다. 따라서 0.51을 골격근 손실 비율의 "상한선"으로
   삼는 것이 보수적(타이트)이다. (참고: SURPASS-3 MRI 하위연구도 tirzepatide의 근육 부피 변화가
   동일 체중감소량 기준 일반 인구집단 예측치와 "비슷한 수준"이라고 정성적으로 보고해 이 결론과 상충하지 않는다.)
   => 비율 0.3 이하: 임상 기준보다 우수. 0.3~0.51: 임상 기준 범위 내. 0.51 초과: 임상 기준보다 근손실 비중 높음.
*/
// 체중은 거의 그대로인데 체지방/골격근만 크게 바뀐 경우 — BIA 측정오차(수분상태 등) 가능성 판별
function checkMeasurementArtifact(recA, recB){
  if(!recA || !recB) return null;
  const weightDelta = Math.abs(recB.weight - recA.weight);
  const fatDelta = recB.fat - recA.fat;
  const days = Math.max(1, Math.round((new Date(recB.date+'T00:00:00')-new Date(recA.date+'T00:00:00'))/86400000));
  if(weightDelta <= 0.3 && Math.abs(fatDelta) >= 0.5){
    const neededKcalPerDay = Math.round(Math.abs(fatDelta)*7700/days);
    return {isArtifact:true, neededKcalPerDay, weightDelta, fatDelta, days};
  }
  return null;
}

function computeMuscleAssessment(startRec, endRec){
  if(!startRec || !endRec) return {muscleLoss:0, weightLoss:0, ratio:null, tone:'neutral', label:'데이터 부족'};
  const muscleLoss = startRec.muscle - endRec.muscle; // 양수 = 감소
  const weightLoss = startRec.weight - endRec.weight; // 양수 = 감소
  const muscleLossPct = (muscleLoss/startRec.muscle)*100;
  const weightLossPct = (weightLoss/startRec.weight)*100;
  const BENCHMARK = 0.51; // SURMOUNT-1 DEXA 실측 비율 (제지방량 기준 상한선)

  if(muscleLoss <= 0){
    return {muscleLoss, weightLoss, muscleLossPct, weightLossPct, ratio:0, tone:'good', label:'골격근 유지/증가'};
  }
  if(weightLossPct <= 0.3){
    return {muscleLoss, weightLoss, muscleLossPct, weightLossPct, ratio:null, tone:'warn', label:'체중 변화 없이 골격근만 감소'};
  }
  const ratio = muscleLossPct/weightLossPct;
  let tone, label;
  if(ratio <= BENCHMARK*0.6){ tone='good'; label='임상 기준보다 우수'; }
  else if(ratio <= BENCHMARK){ tone='neutral'; label='임상 기준 범위 내'; }
  else { tone='warn'; label='임상 기준보다 근손실 비중 높음'; }
  return {muscleLoss, weightLoss, muscleLossPct, weightLossPct, ratio, tone, label, benchmark:BENCHMARK};
}

/* ---------- 인사이트 계산 ---------- */
function computeInsights(){
  const ib = sortedInbody();

  const weightLoss = first.weight - last.weight;
  const fatMassLoss = first.fat - last.fat;
  const muscleAssess = computeMuscleAssessment(first, last);

    {icon:'target', label:'2차(18%) 목표 달성률', value:`${fmt(achieveRate18,0)}%`, sub:`체지방률 ${fmt(START_FAT_PCT)}% → ${fmt(last.fatPct)}% (목표 18%)`, tone:'good'},
    {icon:'down', label:'누적 체중 변화', value:`${fmt(weightLoss)}kg`, sub:`${first.date.slice(5)} ${fmt(first.weight)}kg → ${last.date.slice(5)} ${fmt(last.weight)}kg`, tone:'good'},
    {icon:'down', label:'누적 체지방량 변화', value:`${fmt(fatMassLoss)}kg`, sub:`${fmt(first.fat)}kg → ${fmt(last.fat)}kg`, tone:'good'},
    {icon:'dumbbell', label:'체중감량 대비 골격근 보존', value: muscleAssess.muscleLoss<=0 ? '유지/증가' : `비율 ${fmt(muscleAssess.ratio,2)}`, sub: muscleAssess.muscleLoss<=0 ? `골격근 ${fmt(last.muscle)}kg — 감소 없음` : `골격근 -${fmt(muscleAssess.muscleLossPct,1)}% / 체중 -${fmt(muscleAssess.weightLossPct,1)}% · ${muscleAssess.label}(SURMOUNT-1 DEXA 실측 비율 0.51 기준)`, tone: muscleAssess.tone},
    {icon: maTrendDelta<=0?'down':'up', label:'최근 7일 체지방률 추세', value:`${maTrendDelta>=0?'+':''}${fmt(maTrendDelta,2)}%p`, sub:'이동평균 기준 (일일 노이즈 제외)', tone: maTrendDelta<=0?'good':'warn'},
  ];
  return {insights, first, last, ma};
}

/* ---------- 스마트 인사이트 (규칙 기반 자동 분석, Claude 개입 없이 매번 새로 계산) ---------- */
function computeSmartAlerts(ib, meals){
  // 후보군(candidate pool) 방식: 가능한 모든 인사이트 후보를 만들고, 각각에 중요도 점수(score)를 매긴 뒤
  // 상위 N개만 매번 동적으로 선정합니다. 데이터 상황에 따라 더 중요한 인사이트가 자동으로 앞에 옵니다.
  const candidates = [];
  if(ib.length < 2) return [];
  const last = ib[ib.length-1];
  const push = (c) => candidates.push(c);

  // 1) 체지방량 정체
  if(ib.length >= 3){
    const last3 = ib.slice(-3);
    const fatVals = last3.map(r=>r.fat);
    const spread = Math.max(...fatVals) - Math.min(...fatVals);
    if(spread <= 0.15){
      push({tone:'warn', icon:'target', score: 75 + (0.15-spread)*100,
        title:'체지방 감량 정체 감지',
        detail:`최근 ${last3.length}회 측정에서 체지방량이 ${fmt(Math.min(...fatVals))}~${fmt(Math.max(...fatVals))}kg 사이에 머물러 있어요(${last3[0].date.slice(5)}~${last3[last3.length-1].date.slice(5)}). 정체기일 수 있어요 — 칼로리 재설정 여부를 확인해보세요.`});
    }
  }

  // 2) 골격근 손실 평가
  const muscleAssess = computeMuscleAssessment(ib[0], last);
  if(muscleAssess.tone === 'warn'){
    if(muscleAssess.weightLossPct <= 0.3){
      push({tone:'warn', icon:'dumbbell', score: 88,
        title:'체중 변화 없이 골격근만 감소',
        detail:`골격근이 ${fmt(muscleAssess.muscleLoss)}kg 줄었는데 체중은 거의 안 줄었어요(${fmt(muscleAssess.weightLossPct,1)}%). 단백질 섭취나 저항운동 부족일 수 있어요.`});
    } else {
      push({tone:'warn', icon:'dumbbell', score: 85,
        title:'체중감량 대비 근손실 비중 높음',
        detail:`체중 -${fmt(muscleAssess.weightLossPct,1)}% 대비 골격근 -${fmt(muscleAssess.muscleLossPct,1)}%로, 비율 ${fmt(muscleAssess.ratio,2)}가 SURMOUNT-1 실측 기준(0.51)보다 높아요.`});
    }
  } else if(muscleAssess.tone === 'good' && muscleAssess.muscleLoss > 0){
    push({tone:'good', icon:'dumbbell', score: 55,
      title:'골격근 보존 우수 (임상 예상 대비)',
      detail:`체중 -${fmt(muscleAssess.weightLossPct,1)}% 대비 골격근 -${fmt(muscleAssess.muscleLossPct,1)}%로, 비율 ${fmt(muscleAssess.ratio,2)}는 임상 기준(0.51)보다 훨씬 낮아요.`});
  }

  // 3) 칼로리 목표 이탈
  if(last.bmr && meals.length >= 5){
    const targetLow = Math.round(last.bmr*1.5-550);
    const targetHigh = targetLow+100;
    const recent5 = [...meals].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
    const avgCal = recent5.reduce((s,m)=>s+(m.calories||0),0)/recent5.length;
    if(avgCal > targetHigh+150){
      push({tone:'warn', icon:'up', score: 80,
        title:'섭취 칼로리가 목표보다 높아요',
        detail:`목표 ${targetLow}~${targetHigh}kcal인데, 최근 5끼 평균 ${fmt(avgCal,0)}kcal예요.`});
    } else if(avgCal < targetLow-150){
      push({tone:'warn', icon:'down', score: 83,
        title:'섭취 칼로리가 너무 낮아요',
        detail:`목표 ${targetLow}~${targetHigh}kcal인데, 최근 5끼 평균 ${fmt(avgCal,0)}kcal예요. 과도한 저칼로리는 근손실·대사저하 위험이 있어요.`});
    }
    if(ib.length >= 8){
      const bmrThen = ib[ib.length-8].bmr;
      if(bmrThen && bmrThen - last.bmr >= 25){
        push({tone:'neutral', icon:'target', score: 50,
          title:'기초대사량 변화 — 칼로리 목표 재계산 시점',
          detail:`기초대사량이 ${bmrThen}kcal → ${last.bmr}kcal로 낮아졌어요. 목표를 ${targetLow}~${targetHigh}kcal로 다시 맞춰주세요.`});
      }
    }
  }

  // 4) 체중 정체
  if(ib.length >= 3){
    const last3w = ib.slice(-3).map(r=>r.weight);
    if(last3w[last3w.length-1] >= last3w[0]){
      push({tone:'warn', icon:'up', score: 65,
        title:'체중 정체 또는 반등',
        detail:`최근 측정에서 체중이 ${fmt(last3w[0])}kg → ${fmt(last3w[last3w.length-1])}kg으로 줄지 않았어요. 며칠 더 지켜보되, 지속되면 칼로리를 점검해보세요.`});
    }
  }

  // 5) 7일 이동평균 체지방률 긍정 추세
  const ma = movingAverage(ib, 'fatPct', 7);
  const recentMA = ma.slice(-7);
  if(recentMA.length >= 5){
    const maTrend = recentMA[recentMA.length-1].fatPctMA - recentMA[0].fatPctMA;
    if(maTrend <= -0.3){
      push({tone:'good', icon:'down', score: 45 + Math.abs(maTrend)*10,
        title:'체지방률 꾸준히 감소 중',
        detail:`7일 이동평균 체지방률이 최근 ${recentMA.length}회 측정 동안 ${fmt(Math.abs(maTrend),2)}%p 낮아졌어요. 지금 페이스를 유지하면 좋아요.`});
    }
  }

  // 6) 목표 임박 격려 (18% 목표 90% 이상 달성)
  const achieveRate18 = Math.min(100, Math.max(0, ((START_FAT_PCT-last.fatPct)/(START_FAT_PCT-18))*100));
  if(achieveRate18 >= 90 && achieveRate18 < 100){
    push({tone:'good', icon:'target', score: 60,
      title:'2차 목표(18%) 코앞', detail:`현재 달성률 ${fmt(achieveRate18,0)}% — 조금만 더 하면 최종 목표예요.`});
  }

  // 7) 최근 측정 공백 (데이터 최신성)
  const gapDays = Math.round((new Date(todayISO()+'T00:00:00') - new Date(last.date+'T00:00:00'))/86400000);
  if(gapDays >= 3){
    push({tone:'warn', icon:'target', score: 60 + gapDays*3,
      title:'최근 인바디 측정 공백', detail:`마지막 측정일이 ${last.date} — ${gapDays}일째예요. 추세 판단 정확도가 떨어질 수 있어요.`});
  }

  // 8) 목표 도달 예상 기간 (최근 페이스 선형 추정)
  if(ib.length >= 8 && achieveRate18 < 100){
    const prev = ib[ib.length-8];
    const paceWeek = (prev.fatPct - last.fatPct); // 7일간 감소량
    if(paceWeek > 0){
      const remain = last.fatPct - 18;
      const weeksLeft = Math.ceil(remain / paceWeek);
      push({tone:'neutral', icon:'target', score: 38,
        title:'최근 페이스 기준 목표 도달 예상', detail:`최근 7일 ${fmt(paceWeek,2)}%p 감소 페이스라면, 18% 목표까지 약 ${weeksLeft}주 남았어요.`});
    }
  }

  // 9) 체중은 그대로인데 체성분만 급변 — BIA 측정오차(수분상태 등) 가능성
  if(ib.length >= 2){
    const prev = ib[ib.length-2];
    const artifact = checkMeasurementArtifact(prev, last);
    if(artifact){
      push({tone:'neutral', icon:'target', score: 70,
        title:'체중 불변, 체성분만 급변 — 측정오차 가능성',
        detail:`체중은 ${prev.date}→${last.date} 사이 거의 그대로인데(${fmt(artifact.weightDelta,1)}kg 차이) 체지방량이 ${artifact.fatDelta>0?'+':''}${fmt(artifact.fatDelta,1)}kg 바뀌었어요. 실제 변화라면 하루 약 ${artifact.neededKcalPerDay.toLocaleString()}kcal 잉여/적자가 필요한데 비현실적이에요 — 수분 상태 등 BIA 측정 조건 차이일 가능성이 높습니다. 같은 조건(공복·기상 직후)에서 재측정해 추세를 다시 확인해보세요.`});
    }
  }

  // 10) 체지방 정체 + NEAT 교차검증 (활동량 문제인지 아닌지 판별)
  if(ib.length >= 3 && state.steps && state.steps.length){
    const last3fat = ib.slice(-3).map(r=>r.fat);
    const isPlateau = (Math.max(...last3fat) - Math.min(...last3fat)) <= 0.2;
    if(isPlateau){
      const breakdowns = state.steps.map(s => ({...s, ...computeStepBreakdown(s, state.workouts)}));
      const last7 = daysAgoList(7), last14 = daysAgoList(14);
      const recent7 = breakdowns.filter(b=>last7.includes(b.date));
      const prior7 = breakdowns.filter(b=>last14.includes(b.date) && !last7.includes(b.date));
      if(recent7.length && prior7.length){
        const avgRecent = recent7.reduce((s,b)=>s+b.neat,0)/recent7.length;
        const avgPrior = prior7.reduce((s,b)=>s+b.neat,0)/prior7.length;
        const diffPct = ((avgRecent-avgPrior)/avgPrior)*100;
        if(diffPct >= -10){
          push({tone:'neutral', icon:'target', score: 55,
            title:'체지방 정체, NEAT는 정상 — 활동량 문제 아님',
            detail:`체지방이 정체된 동안 일상활동(NEAT)은 오히려 유지·증가했어요(최근 7일 ${fmt(avgRecent,0)}보, 이전 7일 ${fmt(avgPrior,0)}보). 활동량 감소가 원인은 아니고, 측정오차(수분)나 섭취 칼로리, 용량 타이밍 쪽을 더 살펴볼 만해요.`});
        } else {
          push({tone:'warn', icon:'target', score: 72,
            title:'체지방 정체 + NEAT 감소 동반',
            detail:`체지방 정체 기간에 일상활동(NEAT)도 최근 7일 ${fmt(avgRecent,0)}보로 이전 7일(${fmt(avgPrior,0)}보) 대비 ${fmt(Math.abs(diffPct),0)}% 줄었어요. 활동량 감소가 정체의 한 원인일 수 있어요.`});
        }
      }
    }
  }

  if(candidates.length === 0){
    return [{tone:'good', icon:'target', title:'특이사항 없음', detail:'체중·체지방·골격근량·섭취 칼로리 모두 계획 범위 안에서 안정적으로 진행되고 있어요.'}];
  }

  candidates.sort((a,b)=>b.score-a.score);
  return candidates.slice(0,6);
}

/* ---------- 마운자로 투여 차수별 트렌드 ---------- */
function computeMounjaroCycles(){
  const ib = sortedInbody();
  return MOUNJARO_DOSES.map((d, i) => {
    const nextDate = MOUNJARO_DOSES[i+1] ? MOUNJARO_DOSES[i+1].date : null;
    const inCycle = ib.filter(r => r.date >= d.date && (!nextDate || r.date <= nextDate));
    const start = inCycle[0] || null;
    const end = inCycle[inCycle.length-1] || null;
    return {
      ...d,
      start, end, count: inCycle.length,
      weightDelta: (start && end) ? end.weight - start.weight : null,
      muscleDelta: (start && end) ? end.muscle - start.muscle : null,
      fatDelta: (start && end) ? end.fat - start.fat : null,
      fatPctDelta: (start && end) ? end.fatPct - start.fatPct : null,
    };
  });
}

/* ---------- 마운자로 차수별 인사이트 (데이터 기반, 매번 재계산) ---------- */
function computeMounjaroInsights(cycles){
  const done = cycles.filter(c => c.end && c.weightDelta !== null);
  if(done.length < 2) return [];
  const insights = [];

  // 1) 체지방 감소가 가장 컸던 차수
  const byFatLoss = [...done].sort((a,b)=> a.fatDelta - b.fatDelta); // 가장 음수(감소 큼)가 먼저
  const best = byFatLoss[0];
  if(best.fatDelta < 0){
    insights.push({tone:'good', title:`${best.cycle}차가 체지방 감소 최대`, detail:`${best.date} 투여 차수에서 체지방량이 ${fmt(Math.abs(best.fatDelta))}kg 줄어 전체 차수 중 가장 큰 감소폭을 보였어요.`});
  }

  // 2) 정체/악화 구분 + 측정오차 교차검증
  const worst = [...done].sort((a,b)=> b.fatDelta - a.fatDelta)[0];
  if(worst.fatDelta >= -0.15){
    const isWorsening = worst.fatDelta > 0.15;
    const artifact = checkMeasurementArtifact(worst.start, worst.end);
    const isLatest = worst.cycle === done[done.length-1].cycle;
    let detail = `${worst.date} 투여 차수에서 체지방량이 ${worst.fatDelta>0?'+':''}${fmt(worst.fatDelta)}kg ${isWorsening?'늘었어요':'변화에 그쳐 거의 정체됐어요'}.`;
    if(artifact){
      detail += ` 다만 그 기간 체중은 거의 그대로라(${fmt(artifact.weightDelta,1)}kg 차이) 전부 실제 변화로 보긴 어렵고, 하루 ${artifact.neededKcalPerDay.toLocaleString()}kcal 수준의 측정오차(수분상태 등)가 섞였을 가능성이 있어요.`;
    } else if(isLatest){
      detail += ' 아직 진행 중인 차수라 마지막에 반영될 여지는 있어요.';
    }
    insights.push({tone: isWorsening && !artifact ? 'warn' : 'warn', title: isWorsening ? `${worst.cycle}차 체지방 증가` : `${worst.cycle}차는 정체 구간`, detail});
  }

  // 3) 차수별 감소 속도 추세 (초반 절반 vs 후반 절반 평균 비교)
  if(done.length >= 4){
    const mid = Math.floor(done.length/2);
    const earlyAvg = done.slice(0,mid).reduce((s,c)=>s+c.fatDelta,0)/mid;
    const lateAvg = done.slice(mid).reduce((s,c)=>s+c.fatDelta,0)/(done.length-mid);
    const diff = lateAvg - earlyAvg; // 양수면 최근이 덜 빠짐(둔화)
    if(diff >= 0.15){
      insights.push({tone:'warn', title:'체지방 감소 속도 둔화 추세', detail:`초반 차수 평균 ${fmt(earlyAvg)}kg/차 감소에서 최근 차수 평균 ${fmt(lateAvg)}kg/차로 느려졌어요. 칼로리 재설정이나 활동량 점검을 고려해보세요.`});
    } else if(diff <= -0.15){
      insights.push({tone:'good', title:'체지방 감소 속도 가속', detail:`초반 차수 평균 ${fmt(earlyAvg)}kg/차에서 최근 차수 평균 ${fmt(lateAvg)}kg/차로 더 빨라졌어요. 지금 루틴이 잘 맞고 있는 것 같아요.`});
    }
  }

  // 4) 전체 기간 골격근 보존 여부 (체지방 감소 대비 비율, 임상 벤치마크 반영)
  const first = done[0].start, lastEnd = done[done.length-1].end;
  if(first && lastEnd){
    const ma_ = computeMuscleAssessment(first, lastEnd);
    if(ma_.tone === 'good' && ma_.muscleLoss > 0){
      insights.push({tone:'good', title:'전체 기간 골격근 보존 우수', detail:`1차 이후 체중 -${fmt(ma_.weightLossPct,1)}% 대비 골격근 -${fmt(ma_.muscleLossPct,1)}%, 비율 ${fmt(ma_.ratio,2)}로 tirzepatide DEXA 임상연구(SURMOUNT-1, Look et al. 2025) 실측 비율(0.51)보다 훨씬 낮아요 — 저항운동·단백질 전략이 효과적으로 작동 중이에요.`});
    } else if(ma_.tone === 'warn'){
      insights.push({tone:'warn', title:'전체 기간 골격근 손실 비중 높음', detail: ma_.weightLossPct<=0.3 ? `체중 변화 없이 골격근만 ${fmt(ma_.muscleLoss)}kg 줄었어요.` : `체중 -${fmt(ma_.weightLossPct,1)}% 대비 골격근 -${fmt(ma_.muscleLossPct,1)}%, 비율 ${fmt(ma_.ratio,2)}로 SURMOUNT-1 DEXA 실측 기준(0.51)보다 높아요. 저항운동 볼륨이나 단백질 섭취를 늘리는 걸 고려해보세요.`});
    }
  }

  // 5) 진행 중인 마지막 차수의 페이스 비교
  const last = done[done.length-1];
  if(done.length >= 2 && last.count >= 1){
    const priorAvgFat = done.slice(0,-1).reduce((s,c)=>s+c.fatDelta,0)/(done.length-1);
    if(last.fatDelta - priorAvgFat >= 0.15){
      insights.push({tone:'warn', title:`진행 중인 ${last.cycle}차, 이전 평균보다 느림`, detail:`지금까지 ${fmt(last.fatDelta)}kg 변화로, 이전 차수 평균(${fmt(priorAvgFat)}kg)보다 감소 속도가 느려요. 차수가 끝나기 전에 식단·활동량을 점검해볼 만해요.`});
    } else if(last.fatDelta - priorAvgFat <= -0.15){
      insights.push({tone:'good', title:`진행 중인 ${last.cycle}차, 이전 평균보다 빠름`, detail:`지금까지 ${fmt(last.fatDelta)}kg 변화로, 이전 차수 평균(${fmt(priorAvgFat)}kg)보다 빠르게 줄고 있어요.`});
    }
  }

  return insights.slice(0,5);
}

function renderMounjaro(){
  const cycles = computeMounjaroCycles();
  const validCycles = cycles.filter(c => c.end);
  if(validCycles.length===0) return `<div class="empty-state">아직 이 기간의 인바디 기록이 없습니다.</div>`;

  const firstDoseDate = MOUNJARO_DOSES[0].date;
  const fullData = sortedInbody().filter(r => r.date >= firstDoseDate);
  const vlines = MOUNJARO_DOSES.map(d => ({date:d.date, label:`${d.cycle}차`}));
  const insights = computeMounjaroInsights(cycles);

  return `
    <section class="card">
      <div class="section-label good">${secNum('03b')}마운자로 투여 기록</div>
      <p class="p-dim">매주 목요일 2.5mg 투여 중 · 현재 ${validCycles.length}차까지 진행됐고, 각 차수(투여일~다음 투여 전날)별 인바디 변화를 추적합니다.</p>
    </section>

    ${insights.length ? `
    <section class="card">
      <div class="section-label good">${secNum('03c')}차수별 인사이트 <span class="dim" style="font-weight:500; text-transform:none; letter-spacing:0;">· ${state.lastUpdated ? '최종 갱신 '+fmtDateTime(state.lastUpdated) : '데이터 기반 자동 분석'}</span></div>
      <div class="alert-list">
        ${insights.map(a => `
          <div class="alert-item ${a.tone==='warn'?'tone-warn-item':a.tone==='good'?'tone-good-item':''}">
            <div class="alert-icon tone-${a.tone||'neutral'}">${ICONS[a.tone==='warn'?'up':a.tone==='good'?'down':'target']}</div>
            <div class="alert-body">
              <div class="alert-title tone-${a.tone||'neutral'}">${a.title}</div>
              <div class="alert-detail">${a.detail}</div>
            </div>
          </div>`).join('')}
      </div>
    </section>` : ''}

    <section>
      <div class="section-label">${secNum('03d')}체성분 변화 (전체 일별 추이, 차수 경계 표시)</div>
      <div class="chart-grid">
        ${chartCard('체중', fullData, 'weight', 'kg', '--c-weight', null, vlines)}
        ${chartCard('골격근량', fullData, 'muscle', 'kg', '--c-muscle', MUSCLE_BASELINE, vlines)}
        ${chartCard('체지방량', fullData, 'fat', 'kg', '--c-fat', null, vlines)}
        ${chartCard('체지방률', fullData, 'fatPct', '%', '--c-fatpct', 18, vlines)}

    <section class="card">

        <table class="data-table">
          <thead><tr>
            <th style="text-align:left">차수</th><th style="text-align:left">투여일</th><th>용량</th>

          </tr></thead>
          <tbody>
            ${cycles.map(c => `<tr>
              <td>${c.cycle}차</td>
              <td>${c.date} (목)</td>
              <td>${c.dose}</td>
              <td>${!c.start||!c.end ? '—' : `${fmt(c.start.weight)}→${fmt(c.end.weight)}kg <span class="${c.weightDelta<=0?'good-text':'warn-text'}">(${c.weightDelta>0?'+':''}${fmt(c.weightDelta)})</span>`}</td>
              <td>${!c.start||!c.end ? '—' : `${fmt(c.start.muscle)}→${fmt(c.end.muscle)}kg <span class="${c.muscleDelta>=0?'good-text':'warn-text'}">(${c.muscleDelta>0?'+':''}${fmt(c.muscleDelta)})</span>`}</td>
              <td>${!c.start||!c.end ? '—' : `${fmt(c.start.fat)}→${fmt(c.end.fat)}kg <span class="${c.fatDelta<=0?'good-text':'warn-text'}">(${c.fatDelta>0?'+':''}${fmt(c.fatDelta)})</span>`}</td>
              <td>${!c.start||!c.end ? '—' : `${fmt(c.start.fatPct)}→${fmt(c.end.fatPct)}% <span class="${c.fatPctDelta<=0?'good-text':'warn-text'}">(${c.fatPctDelta>0?'+':''}${fmt(c.fatPctDelta)}%p)</span>`}</td>

      <div class="note-box" style="margin-top:14px;">각 셀은 "차수 시작 시점 측정치 → 차수 종료 시점 측정치" 형태이며, 괄호 안은 변화량(Δ)입니다.${(() => {
        const last = cycles[cycles.length-1];
        if(!last) return '';
        const [, mo, da] = last.date.split('-');
        return ` ${last.cycle}차(${Number(mo)}/${Number(da)})는 다음 투여 전까지 진행 중이라 현재까지의 변화만 반영돼요.`;
      })()}</div>
    </section>
  `;
}

/* ---------- 잘하고 있는 점 / 아쉬운 점 (데이터 기반, 매번 재계산) ---------- */
function computeStrengthsAndImprovements(ib, workouts, meals){
  const strengths = [];
  const improvements = [];
  if(ib.length < 2) return {strengths, improvements};
  const first = ib[0], last = ib[ib.length-1];
  const today = todayISO();

  const weightLoss = first.weight - last.weight;
  const fatMassLoss = first.fat - last.fat;
  const muscleAssess = computeMuscleAssessment(first, last);
  const achieveRate18 = Math.min(100, Math.max(0, ((START_FAT_PCT-last.fatPct)/(START_FAT_PCT-18))*100));
  const achieveRate20 = Math.min(100, Math.max(0, ((START_FAT_PCT-last.fatPct)/(START_FAT_PCT-20))*100));

  const last7Dates = Array.from({length:7}, (_,i) => { const d=new Date(today+'T00:00:00'); d.setDate(d.getDate()-i); return toLocalISO(d); });
  const workoutDaysLast7 = last7Dates.filter(d => { const t=classifyDayType(workouts,d); return t && t.type!=='휴식'; }).length;

  const recentMeals = [...meals].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10);
  const proteinRate = recentMeals.length ? (recentMeals.filter(m => (m.protein||0) >= PROTEIN_TARGET.min).length / recentMeals.length * 100) : null;

  const calorieRate = (last.bmr && recentMeals.length) ? (recentMeals.filter(m => {
    const lo = last.bmr*1.5-550, hi = lo+100;
    return (m.calories||0) <= hi+50;
  }).length / recentMeals.length * 100) : null;

  const ma = movingAverage(ib, 'fatPct', 7);
  const recentMA = ma.slice(-7);
  const maTrend = recentMA.length>=2 ? recentMA[recentMA.length-1].fatPctMA - recentMA[0].fatPctMA : 0;

  const last3fat = ib.slice(-3).map(r=>r.fat);
  const fatSpread = last3fat.length>=3 ? Math.max(...last3fat)-Math.min(...last3fat) : null;

  const lastLogGapDays = Math.round((new Date(today) - new Date(last.date)) / 86400000);

  // 잘하고 있는 점 후보
  if(weightLoss > 0) strengths.push({title:'체중 꾸준히 감소', detail:`시작 대비 ${fmt(weightLoss)}kg 감량 (${first.date.slice(5)} ${fmt(first.weight)}kg → ${last.date.slice(5)} ${fmt(last.weight)}kg)`});
  if(fatMassLoss > 0) strengths.push({title:'체지방량 감소', detail:`시작 대비 ${fmt(fatMassLoss)}kg 감량`});
  if(achieveRate20 >= 100) strengths.push({title:'1차 목표(20%) 달성 완료 ✓', detail:`체지방률 ${fmt(START_FAT_PCT)}% → ${fmt(last.fatPct)}%로 1차 목표를 이미 넘어섰어요.`});
  else if(achieveRate20 >= 50) strengths.push({title:'1차 목표(20%) 절반 이상 달성', detail:`현재 달성률 ${fmt(achieveRate20,0)}%`});
  if(achieveRate18 >= 100) strengths.push({title:'2차 목표(18%) 달성 완료 ✓', detail:`체지방률 ${fmt(START_FAT_PCT)}% → ${fmt(last.fatPct)}%로 최종 목표까지 달성했어요!`});
  else if(achieveRate18 >= 50) strengths.push({title:'2차 목표(18%) 절반 이상 달성', detail:`현재 달성률 ${fmt(achieveRate18,0)}%`});
  if(muscleAssess.tone === 'good') strengths.push({title:'골격근 보존 우수', detail: muscleAssess.muscleLoss<=0 ? `골격근량 감소 없이 유지 중 (현재 ${fmt(last.muscle)}kg)` : `체중 -${fmt(muscleAssess.weightLossPct,1)}% 대비 골격근 -${fmt(muscleAssess.muscleLossPct,1)}% — 비율 ${fmt(muscleAssess.ratio,2)}로 SURMOUNT-1 DEXA 실측 기준(0.51)보다 낮아요`});
  if(workoutDaysLast7 >= 4) strengths.push({title:'꾸준한 운동 습관', detail:`최근 7일 중 ${workoutDaysLast7}일 운동`});
  if(proteinRate !== null && proteinRate >= 70) strengths.push({title:'단백질 섭취 잘 지킴', detail:`최근 10끼 중 ${fmt(proteinRate,0)}%에서 목표(${PROTEIN_TARGET.min}~${PROTEIN_TARGET.max}g) 충족`});
  if(calorieRate !== null && calorieRate >= 70) strengths.push({title:'칼로리 목표 준수 양호', detail:`최근 10끼 중 ${fmt(calorieRate,0)}%가 목표 범위 안`});
  if(maTrend <= -0.2) strengths.push({title:'체지방률 추세 개선 중', detail:`7일 이동평균 기준 ${fmt(Math.abs(maTrend),2)}%p 하락`});

  // 아쉬운 점 후보
  if(fatSpread !== null && fatSpread <= 0.15) improvements.push({title:'체지방 감량 정체', detail:`최근 3회 측정에서 체지방량이 ${fmt(Math.min(...last3fat))}~${fmt(Math.max(...last3fat))}kg 사이 정체`});
  if(muscleAssess.tone === 'warn') improvements.push({title:'골격근 손실 비중 높음', detail: muscleAssess.weightLossPct<=0.3 ? `체중 변화 없이 골격근만 ${fmt(muscleAssess.muscleLoss)}kg 감소 — 단백질·저항운동 점검 필요` : `체중 -${fmt(muscleAssess.weightLossPct,1)}% 대비 골격근 -${fmt(muscleAssess.muscleLossPct,1)}%, 비율 ${fmt(muscleAssess.ratio,2)}로 SURMOUNT-1 DEXA 실측 기준(0.51)보다 높아요`});
  if(proteinRate !== null && proteinRate < 50) improvements.push({title:'단백질 섭취 부족 빈도 높음', detail:`최근 10끼 중 목표 충족 ${fmt(proteinRate,0)}%뿐`});
  if(calorieRate !== null && calorieRate < 50) improvements.push({title:'칼로리 목표 이탈 빈도 높음', detail:`최근 10끼 중 목표 범위 준수 ${fmt(calorieRate,0)}%뿐 — 목표 재설정이나 식단 조정이 필요할 수 있어요`});
  if(workoutDaysLast7 <= 2) improvements.push({title:'최근 운동 빈도 낮음', detail:`최근 7일 중 ${workoutDaysLast7}일만 운동`});
  if(ib.length >= 3){
    const last3w = ib.slice(-3).map(r=>r.weight);
    if(last3w[last3w.length-1] >= last3w[0]) improvements.push({title:'체중 정체 또는 반등', detail:`최근 측정에서 ${fmt(last3w[0])}kg → ${fmt(last3w[last3w.length-1])}kg으로 줄지 않음`});
  }
  if(lastLogGapDays >= 2) improvements.push({title:'최근 인바디 기록 공백', detail:`마지막 측정일이 ${last.date} — ${lastLogGapDays}일째 기록이 없어요. 추세 판단 정확도가 떨어질 수 있어요`});

  return {strengths: strengths.slice(0,5), improvements: improvements.slice(0,5)};
}

// 주간 계획: 고정 로테이션이 아니라, 각 근력 슬롯 시점까지의 '실제' 회복 데이터를 매번 다시 계산해서
// 가장 오래 방치된 부위 그룹을 배정합니다. 캐시하지 않고 매번 최신 workouts로 재계산되므로,
// 계획과 다르게 운동했거나 건너뛴 경우 다음 슬롯부터 자동으로 반영됩니다.
const STRENGTH_GROUPS = [
  {label:'하체', parts:['하체']},
  {label:'등·이두', parts:['등','이두']},
  {label:'가슴·어깨·삼두', parts:['가슴','어깨','삼두']},
];
function getWeeklyPlan(workouts, mondayDate){
  const dates = getWeekDates(mondayDate);
  const plan = {};
  // 2026-07-16 변경: 월/수/금 → 이번 주(~7/19)는 월/수/토, 7/20(월)부터는 월/목/토로 슬롯 변경
  const strengthSlots = mondayDate >= '2026-07-20' ? [0,3,5] : [0,2,5]; // 월/목/토(7/20~) 또는 월/수/토(~7/19)
  const cardioSlots = [0,1,2,3,4,5,6].filter(i=>!strengthSlots.includes(i)); // 나머지 요일(일요일은 자율 라벨 유지)
  const usedGroups = new Set();

  strengthSlots.forEach(di => {
    const date = dates[di];
    const recovery = computeBodyPartRecovery(workouts, date, true); // 그 날짜 이전까지의 실제 데이터 기준
    const recMap = Object.fromEntries(recovery.map(r=>[r.part, r.daysElapsed===null ? 999 : r.daysElapsed]));
    const candidates = STRENGTH_GROUPS.filter(g=>!usedGroups.has(g.label))
      .map(g => ({...g, score: Math.max(...g.parts.map(p=>recMap[p]))}))
      .sort((a,b)=>b.score-a.score);
    const chosen = candidates[0] || STRENGTH_GROUPS[Math.floor(Math.random()*STRENGTH_GROUPS.length)];
    usedGroups.add(chosen.label);
    const worstPart = [...chosen.parts].sort((a,b)=>recMap[b]-recMap[a])[0];
    const worstDays = recMap[worstPart];
    plan[date] = {
      type:'근력', label:chosen.label,
      reason: worstDays>=999 ? `${worstPart} 기록 없음 — 우선 배정` : `${worstPart} 마지막 자극 후 ${worstDays}일 경과 — 가장 방치된 그룹`
    };
  });
  cardioSlots.forEach(di => { plan[dates[di]] = {type:'유산소', label: di===6 ? '인클라인 트레드밀(자율)' : '인클라인 트레드밀'}; });
  const thuDate = dates[3];
  if(MOUNJARO_DOSES.some(d=>d.date===thuDate)) plan[thuDate].label += '(투여일, 가볍게)';
  return plan;
}
function planForDate(date, workouts){
  return getWeeklyPlan(workouts, isoWeekKey(date))[date] || null;
}
function planLabelToParts(label){
  if(!label) return [];
  return BODY_PARTS.filter(p => label.includes(p));
}

function classifyDayType(workouts, date){
  const entries = workouts.filter(w=>w.date===date);
  if(entries.length===0) return null;
  const restOnly = entries.every(w => w.part==='회복');
  if(restOnly) return {type:'휴식', label:entries[0].name||'휴식'};
  let hasStrength=false, hasCardio=false, labels=[];
  entries.forEach(w=>{
    const text = `${w.name||''} ${w.part||''} ${w.note||''}`;
    if(inferPartsForEntry(w).some(p=>BODY_PARTS.includes(p))) hasStrength=true;
    // 정책 변경(2026-07-15): "혈당" 키워드 자동제외 방식 폐기 — 취약한 텍스트매칭이었음.
    // 이제는 산책의 속도/심박 데이터가 목표존(105-125bpm)·브리스크 페이스에 해당하면
    // Claude가 데이터 입력 시점에 직접 판단해 정상 유산소로 등록함(근거 없으면 미등록).
    if(parseKm(text)>0 || text.includes('유산소') || text.includes('트레드밀') || text.includes('사이클') || text.includes('걷기')) hasCardio=true;
    labels.push(w.name);
  });
  const type = hasStrength && hasCardio ? '둘다' : hasStrength ? '근력' : hasCardio ? '유산소' : '휴식';
  return {type, label: labels.join(' / ')};
}

function getWeekDates(mondayDate){
  return Array.from({length:7},(_,i)=>{ const d=new Date(mondayDate+'T00:00:00'); d.setDate(d.getDate()+i); return toLocalISO(d); });
}

function renderWeeklyPlanSection(workouts){
  const thisMonday = isoWeekKey(todayISO());
  const lastMonday = (()=>{ const d=new Date(thisMonday+'T00:00:00'); d.setDate(d.getDate()-7); return toLocalISO(d); })();
  const dow = ['월','화','수','목','금','토','일'];
  const typeClass = t => t==='근력'?'plan-strength':t==='유산소'?'plan-cardio':t==='둘다'?'plan-both':t==='휴식'?'plan-rest':'plan-none';

  const subtypeCellHTML = (subType, plan, showPlan) => {
    const isPlanned = !!(plan && plan.type === subType);
    const cls = isPlanned ? typeClass(subType) : 'plan-bonus';
    const mark = isPlanned ? ' ✓' : ' 🔥';
    return `<div class="plan-cell ${cls} ${showPlan?'':'solo'}">${subType}${mark}</div>`;
  };

  const weekBlock = (mondayDate, weekLabel, showPlan) => {
    const dates = getWeekDates(mondayDate);
    const strengthCount = dates.filter(d => { const a=classifyDayType(workouts,d); return a && (a.type==='근력'||a.type==='둘다'); }).length;
    const cardioCount = dates.filter(d => { const a=classifyDayType(workouts,d); return a && (a.type==='유산소'||a.type==='둘다'); }).length;
    return `
      <div style="margin-bottom:18px;">
        <div class="week-head">
          <div class="week-title">${weekLabel} (${mondayDate.slice(5)} ~ ${dates[6].slice(5)})</div>
          <div class="week-chips">
            <span class="chip ${strengthCount>=3?'good':''}">근력 ${strengthCount}회 / 목표 3회${strengthCount>3?` 🔥 초과달성 (${Math.round(strengthCount/3*100)}%)`:strengthCount===3?' ✓ 달성 (100%)':''}</span>
            <span class="chip ${cardioCount>=3?'good':''}">유산소 ${cardioCount}회 / 목표 3회${cardioCount>3?` 🔥 초과달성 (${Math.round(cardioCount/3*100)}%)`:cardioCount===3?' ✓ 달성 (100%)':''}</span>
          </div>
        </div>
        <div class="plan-grid">
          ${dates.map((d,i) => {
            const plan = showPlan ? planForDate(d, workouts) : null;
            const actual = classifyDayType(workouts, d);
            const isToday = d===todayISO();
            // 2026-07-16 추가: 계획일(근력/유산소)이 실제로 이행되지 않았으면 계획 타입 + ❌ 를 경고색(plan-missed)으로 별도 표시
            const isFreeSlot = !!(plan && plan.label && plan.label.includes('자율'));
            const isPastDate = d < todayISO(); // 오늘·미래 날짜는 아직 결과가 안 나온 것이므로 미이행으로 판정하지 않음
            const missedCellHTML = (planType) => `<div class="plan-cell plan-missed ${showPlan?'':'solo'}">${planType} ❌</div>`;
            const planNotFulfilled = (fulfilledTypes) => isPastDate && plan && plan.type!=='휴식' && !isFreeSlot && !fulfilledTypes.includes(plan.type);
            const actualCell = !actual
              ? (planNotFulfilled([]) ? missedCellHTML(plan.type) : `<div class="plan-cell plan-none ${showPlan?'':'solo'}">—</div>`)
              : actual.type==='둘다'
                ? subtypeCellHTML('근력', plan, showPlan) + subtypeCellHTML('유산소', plan, showPlan)
                : actual.type==='휴식'
                  ? `<div class="plan-cell plan-rest ${showPlan?'':'solo'}">휴식${plan && plan.type==='휴식' ? ' ✓' : ''}</div>` + (planNotFulfilled(['휴식']) ? missedCellHTML(plan.type) : '')
                  : subtypeCellHTML(actual.type, plan, showPlan) + (planNotFulfilled([actual.type]) ? missedCellHTML(plan.type) : '');
            return `<div class="plan-col ${isToday?'is-today':''} ${planDetailDate===d?'is-selected':''}" onclick="selectPlanDay('${d}')">
              <div class="plan-dow">${dow[i]}${isToday?' ·오늘':''}</div>
              ${showPlan ? `<div class="plan-cell plan-row ${plan?typeClass(plan.type):'plan-none'}">${plan?plan.type:'—'}</div>` : ''}
              ${actualCell}
              <div class="plan-label">${actual ? (actual.label.length>10?actual.label.slice(0,10)+'…':actual.label) : (plan?plan.label:'')}</div>
            </div>`;
          }).join('')}
        </div>
        ${(planDetailDate && dates.includes(planDetailDate)) ? renderPlanDetailPanel(planDetailDate, workouts) : ''}
      </div>`;
  };

  return `
    <section class="card">
      <div class="section-label good">${secNum('W3b')}주간 근력/유산소 계획 &amp; 실적</div>
      ${(() => {
        const advisories = computeSmartAlerts(sortedInbody(), state.meals).filter(a=>a.tone==='warn').slice(0,2);
        if(!advisories.length) return '';
        return `<div class="plan-advisory">
          <div class="plan-advisory-head">⚖️ 이번주 참고사항 (체성분·식단 기반)</div>
          ${advisories.map(a => `<div class="plan-advisory-item"><b>${a.title}</b> — ${a.detail}</div>`).join('')}
        </div>`;
      })()}

let planDetailDate = null;
function donutChartSVG(segments, size){
  size = size || 150;
  const total = segments.reduce((s,x)=>s+x.value,0);
  const r = size/2 - 16, cx=size/2, cy=size/2, circumference = 2*Math.PI*r;
  let offset = 0;
  const arcs = segments.map(seg => {
    const frac = total>0 ? seg.value/total : 0;
    const dash = frac*circumference;
    const el = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" style="stroke:${seg.color}" stroke-width="20" stroke-dasharray="${dash.toFixed(1)} ${(circumference-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    offset += dash;
    return el;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}" style="width:100%; max-width:170px; display:block; margin:0 auto;">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" style="stroke:var(--c-track)" stroke-width="20"/>
    ${arcs}
  </svg>`;
}
function donutLegend(segments){
  const total = segments.reduce((s,x)=>s+x.value,0);
  return `<div class="donut-legend">${segments.map(s=>`<div class="donut-legend-item"><span class="legend-dot" style="background:${s.color}"></span>${s.label} <b>${total>0?fmt(s.value/total*100,0):0}%</b></div>`).join('')}</div>`;
}

          ${gaugeSVG(last.fatPct, START_FAT_PCT, FAT_GOALS)}
