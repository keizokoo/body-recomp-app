          <div class="gauge-sub">현재 체지방률 · 시작 대비 ${fmt(START_FAT_PCT-last.fatPct)}%p 감소</div>
          ${maTrend7!==null ? `<div class="gauge-sub" style="margin-top:2px; font-size:11px; color:${maTrend7<=-0.05?'var(--c-good)':maTrend7>=0.05?'var(--c-warn)':'var(--text-faint)'};">7일 이동평균 대비 ${maTrend7>0?'+':''}${fmt(maTrend7,2)}%p ${maTrend7<=-0.05?'↓ 개선 중':maTrend7>=0.05?'↑ 정체/반등':'· 거의 변화 없음'}</div>` : ''}
          <div class="gauge-legend">
            <span><span class="legend-dot legend-dot-progress"></span>진행</span>
            <span><span class="legend-dot legend-dot-goal"></span>목표(20%·18%)</span>
          </div>
        </div>
        <div class="hero-side">
          <div class="hero-stat"><span class="l">체중</span><span class="v mono">${fmt(last.weight)} kg</span></div>
          <div class="hero-stat"><span class="l">골격근량</span><span class="v mono">${fmt(last.muscle)} kg</span></div>
          <div class="hero-stat"><span class="l">체지방량</span><span class="v mono">${fmt(last.fat)} kg</span></div>
          <div class="hero-stat"><span class="l">최근 기초대사량(BMR)</span><span class="v mono">${last.bmr ?? '—'} kcal</span></div>
          <div class="hero-stat"><span class="l">최근 측정일</span><span class="v mono">${last.date}</span></div>
        </div>
      </div>
      <div class="hero-goals">
        ${FAT_GOALS.map(g=>{
          const totalDist = START_FAT_PCT-g.pct;
          const progressed = Math.min(100, Math.max(0, ((START_FAT_PCT-last.fatPct)/totalDist)*100));
          const done = last.fatPct<=g.pct;
          const remain = Math.max(0, last.fatPct-g.pct);
          const other = last.weight - last.muscle - last.fat;
          const targetMuscle = Math.max(last.muscle, MUSCLE_BASELINE);
          const t = g.pct/100;
          const targetFat = t*(other+targetMuscle) / (1-t);
          const fatLossNeeded = Math.max(0, last.fat - targetFat);
          return `<div class="hero-goal-item">
            <div class="hg-top">
              <span class="hg-label">${g.label} <span class="dim">· 목표 ${g.pct}%</span></span>
              <span class="hg-status ${done?'done':''}">${done?'달성 완료':`${fmt(remain)}%p 남음`}</span>
            </div>
            <div class="hg-bar"><div class="hg-fill" style="width:${progressed}%"></div></div>
            <div class="hg-foot"><span>진행률 ${fmt(progressed,0)}%</span><span>${fmt(START_FAT_PCT)}% → ${fmt(last.fatPct)}% → ${g.pct}%</span></div>
            <div class="hg-detail">${done ? '체지방량 목표 달성 — 유지 단계로 전환' : `현재 체지방량 ${fmt(last.fat)}kg → 약 <b>-${fmt(fatLossNeeded)}kg</b> 추가 감량 필요 (목표 체지방량 ${fmt(targetFat)}kg)`}</div>
          </div>`;
        }).join('')}
      </div>
    </section>

    ${state.aiNote ? `
    <section class="card ai-note">
      <div class="section-label good">${secNum('00')}Claude 분석 <span class="dim" style="font-weight:500; text-transform:none; letter-spacing:0;">· ${state.aiNote.syncedAt ? fmtDateTime(state.aiNote.syncedAt) : state.aiNote.date} 갱신</span></div>

    </section>` : ''}

    <section class="card">
      <div class="section-label good">${secNum('00b')}스마트 인사이트 <span class="dim" style="font-weight:500; text-transform:none; letter-spacing:0;">· ${state.lastUpdated ? '최종 갱신 '+fmtDateTime(state.lastUpdated) : '데이터 기반 자동 감지'}</span></div>
      <div class="alert-list">
        ${computeSmartAlerts(ib, state.meals).map(a => `
          <div class="alert-item ${a.tone==='warn'?'tone-warn-item':a.tone==='good'?'tone-good-item':''}">
            <div class="alert-icon tone-${a.tone}">${ICONS[a.icon] || ICONS.target}</div>
            <div class="alert-body">
              <div class="alert-title tone-${a.tone}">${a.title}</div>
              <div class="alert-detail">${a.detail}</div>
            </div>
          </div>`).join('')}
      </div>
    </section>

    <section class="card">
      <div class="section-label good">${secNum('00c')}체지방률·골격근량 7일 이동평균 추세 <span class="dim" style="font-weight:500; text-transform:none; letter-spacing:0;">· 단일 측정 노이즈를 걸러낸 추세선</span></div>
      <p class="p-dim" style="margin-bottom:14px;">인바디는 하루 컨디션(염분·수분·화장실 여부)에 따라 출렁여요. 이동평균은 그 노이즈를 줄여서 진짜 추세를 보여줘요.</p>
      ${(() => {
        const maFat = movingAverage(ib, 'fatPct', 7);
        const maMuscle = movingAverage(ib, 'muscle', 7);
        const recentFat = maFat.slice(-7), recentMuscle = maMuscle.slice(-7);
        const fatMATrend = recentFat.length>=2 ? recentFat[recentFat.length-1].fatPctMA - recentFat[0].fatPctMA : null;
        const muscleMATrend = recentMuscle.length>=2 ? recentMuscle[recentMuscle.length-1].muscleMA - recentMuscle[0].muscleMA : null;

        let insightBlock = '';
        if(fatMATrend!==null && muscleMATrend!==null){
          const fatDown = fatMATrend <= -0.1;
          const muscleUp = muscleMATrend > 0.15;
          const muscleStable = Math.abs(muscleMATrend) <= 0.15;
          const muscleDown = muscleMATrend <= -0.15;
          let tone, title, detail;
          if(fatDown && muscleUp){
            tone='good'; title='체지방 감소 + 골격근량 증가 — 최상의 흐름';
            detail=`체지방률 이동평균 ${fmt(Math.abs(fatMATrend),2)}%p 하락과 함께 골격근량 이동평균도 +${fmt(muscleMATrend,2)}kg 늘었어요. 지방은 빠지고 근육은 느는, 리컴포지션 중 가장 좋은 조합이에요.`;
          } else if(fatDown && muscleStable){
            tone='good'; title='이상적인 리컴포지션 패턴';
            detail=`체지방률 이동평균은 ${fmt(Math.abs(fatMATrend),2)}%p 하락했는데, 골격근량 이동평균은 ${fmt(Math.abs(muscleMATrend),2)}kg밖에 안 움직였어요(사실상 변화 없음). 지방만 빠지고 근육은 지켜지는 가장 이상적인 형태예요.`;
          } else if(fatDown && muscleDown){
            tone='warn'; title='체지방은 감소, 골격근도 같이 감소';
            detail=`체지방률 이동평균 ${fmt(Math.abs(fatMATrend),2)}%p 하락과 함께, 골격근량 이동평균도 ${fmt(Math.abs(muscleMATrend),2)}kg 줄었어요. 단백질 섭취나 저항운동 볼륨을 점검해볼 만해요.`;
          } else if(!fatDown && muscleUp){
            tone='good'; title='골격근량 증가, 체지방은 아직 정체';
            detail=`골격근량 이동평균이 +${fmt(muscleMATrend,2)}kg 늘었어요. 체지방률 하락은 아직 뚜렷하지 않지만(${fmt(fatMATrend,2)}%p), 근육이 느는 건 분명히 좋은 신호예요.`;
          } else if(!fatDown && muscleStable){
            tone='neutral'; title='체지방 추세 정체, 골격근은 안정적';
            detail=`체지방률 이동평균이 최근 7개 측정 기준 ${fmt(fatMATrend,2)}%p로 큰 변화가 없어요. 골격근량은 안정적으로 유지되고 있으니(${fmt(muscleMATrend,2)}kg), 근손실 걱정 없이 칼로리·활동량만 다시 점검하면 돼요.`;
          } else {
            tone='warn'; title='체지방 정체 + 골격근량 감소 — 점검 필요';
            detail=`체지방률 이동평균 ${fmt(fatMATrend,2)}%p로 큰 변화가 없는데 골격근량 이동평균은 ${fmt(Math.abs(muscleMATrend),2)}kg 줄었어요. 단백질 섭취, 저항운동 볼륨, 칼로리 결손 폭을 함께 점검해보는 게 좋겠어요.`;
          }
          insightBlock = `<div class="alert-item ${tone==='warn'?'tone-warn-item':tone==='good'?'tone-good-item':''}" style="margin-bottom:16px;">
            <div class="alert-icon tone-${tone}">${tone==='warn'?ICONS.up:tone==='good'?ICONS.down:ICONS.target}</div>
            <div class="alert-body"><div class="alert-title tone-${tone}">${title}</div><div class="alert-detail">${detail}</div></div>
          </div>`;
        }

        return `
          ${insightBlock}
          <div class="chart-grid">
            ${chartCard('체지방률 7일 이동평균', maFat, 'fatPctMA', '%', '--c-fatpct', 18)}
            ${chartCard('골격근량 7일 이동평균', maMuscle, 'muscleMA', 'kg', '--c-muscle', MUSCLE_BASELINE)}
          </div>
          ${expandToggleRow('maTable', maFat.length, '일별 상세 기록 보기')}
          ${state.expandedTables['maTable'] ? `
          <div style="overflow-x:auto; margin-top:10px;">
            <table class="data-table">
              <thead><tr><th style="text-align:left">날짜</th><th>체지방률(원본)</th><th>체지방률 MA7</th><th>골격근(원본)</th><th>골격근 MA7</th></tr></thead>
              <tbody>
                ${maFat.slice().reverse().map((r) => {
                  const mRow = maMuscle.find(m=>m.date===r.date);
                  return `<tr>
                  <td style="text-align:left">${r.date}</td>
                  <td>${fmt(r.fatPct,1)}%</td>
                  <td class="good-text">${fmt(r.fatPctMA,2)}%</td>
                  <td>${mRow?fmt(mRow.muscle,1):'—'}kg</td>
                  <td class="good-text">${mRow?fmt(mRow.muscleMA,2):'—'}kg</td>
                </tr>`;}).join('')}
              </tbody>
            </table>
          </div>` : ''}
        `;
      })()}
    </section>

    <section>
      <div class="section-label">${secNum('01')}데이터 기반 인사이트 <span class="dim" style="font-weight:500; text-transform:none; letter-spacing:0;">${state.lastUpdated ? '· 최종 갱신 '+fmtDateTime(state.lastUpdated) : ''}</span></div>
      <div class="insight-grid">
        ${insights.map(ins => `
          <div class="card insight tone-${ins.tone}">
            <div class="ic-label"><span class="ic-icon">${ICONS[ins.icon]}</span>${ins.label}</div>
            <div class="ic-value">${ins.value}</div>
            <div class="ic-sub">${ins.sub}</div>
          </div>`).join('')}
      </div>
    </section>

    <section>
      <div class="section-label">${secNum('02')}체성분 변화 (${ib[0].date.slice(5)} ~ 현재)</div>
      <div class="chart-grid">
        ${chartCard('체중', ib, 'weight', 'kg', '--c-weight')}
        ${chartCard('골격근량', ib, 'muscle', 'kg', '--c-muscle', MUSCLE_BASELINE)}
        ${chartCard('체지방량', ib, 'fat', 'kg', '--c-fat')}

    <section>
      <div class="section-label">${secNum('02b')}잘하고 있는 점 &amp; 아쉬운 점 <span class="dim" style="font-weight:500; text-transform:none; letter-spacing:0;">· ${state.lastUpdated ? '최종 갱신 '+fmtDateTime(state.lastUpdated) : '매일 데이터로 자동 갱신'}</span></div>
      ${(() => {
        const {strengths, improvements} = computeStrengthsAndImprovements(ib, state.workouts, state.meals);
        return `<div class="sw-grid">
          <div class="sw-col">
            <div class="sw-head good">👍 잘하고 있는 점</div>
            ${strengths.length ? strengths.map(s=>`<div class="sw-item"><div class="sw-title">${s.title}</div><div class="sw-detail">${s.detail}</div></div>`).join('') : `<div class="sw-empty">아직 뚜렷한 강점 패턴이 감지되지 않았어요. 기록이 쌓이면 채워집니다.</div>`}
          </div>
          <div class="sw-col">
            <div class="sw-head warn">⚠️ 아쉬운 점</div>
            ${improvements.length ? improvements.map(s=>`<div class="sw-item"><div class="sw-title">${s.title}</div><div class="sw-detail">${s.detail}</div></div>`).join('') : `<div class="sw-empty">특별히 아쉬운 점이 감지되지 않았어요. 잘 진행되고 있어요.</div>`}
          </div>
        </div>`;
      })()}
    </section>

    <section>
      <button class="toggle-row" onclick="toggleTable()">
        ${state.showTable ? '▴' : '▾'} 전체 인바디 기록 표 보기 (${ib.length}건)
      </button>
      ${state.showTable ? renderInbodyTable(ma) : ''}
    </section>
  `;
}
function secNum(n){ return `<span class="sec-num">${n}</span>`; }
function chartCard(title, data, key, unit, colorVar, goal, vlines){
  const vals = data.map(d=>d[key]).filter(v=>v!=null);
  const nowVal = vals[vals.length-1];
  return `<div class="card chart-card">
    <div class="ch-head"><span class="ch-title">${title}</span><span class="ch-now mono" style="color:var(${colorVar})">${fmt(nowVal)}${unit}</span></div>
    ${lineChartSVG(data, key, colorVar, {goal, vlines})}
  </div>`;
}
function toggleTable(){ state.showTable = !state.showTable; render(); }
let editingCell = null; // {table, date, field}
function startEditCell(table, date, field){ editingCell = {table, date, field}; render(); }
function cancelEditCell(){ editingCell = null; render(); }
function saveEditCell(table, date, field, value){
  const arr = table==='inbody' ? state.inbody : table==='workout' ? state.workouts : state.meals;
  const rec = arr.find(r=>r.date===date);
  if(rec){
    const num = value==='' ? null : Number(value);
    rec[field] = (num===null || isNaN(num)) ? null : num;
    const key = table==='inbody' ? LS_KEYS.inbody : table==='workout' ? LS_KEYS.workout : LS_KEYS.meal;
    saveArr(key, arr);
    markUpdated();
  }
  editingCell = null;
  render();
}
function editableCell(table, date, field, value, decimals){
  const isEditing = editingCell && editingCell.table===table && editingCell.date===date && editingCell.field===field;
  if(isEditing){
    return `<input type="number" step="0.1" value="${value??''}" class="inline-edit-input" data-autofocus="1"
      onblur="saveEditCell('${table}','${date}','${field}',this.value)"
      onkeydown="if(event.key==='Enter'){this.blur();} if(event.key==='Escape'){cancelEditCell();}">`;
  }
  return `<span class="editable-cell" onclick="startEditCell('${table}','${date}','${field}')">${value==null?'—':fmt(value,decimals)}</span>`;
}

function renderInbodyTable(ma){
  return `<div class="card" style="margin-top:12px; overflow-x:auto;">
    <table class="data-table">
      <thead><tr><th>날짜</th><th>체중</th><th>골격근</th><th>체지방량</th><th>체지방률</th><th>BMR</th><th>7일 이평</th></tr></thead>
      <tbody>
        ${ma.map(r=>`<tr>
          <td>${r.date}</td>
          <td>${editableCell('inbody', r.date, 'weight', r.weight, 1)}</td>
          <td>${editableCell('inbody', r.date, 'muscle', r.muscle, 1)}</td>
          <td>${editableCell('inbody', r.date, 'fat', r.fat, 1)}</td>
          <td style="color:var(--c-accent-strong); font-weight:700;">${editableCell('inbody', r.date, 'fatPct', r.fatPct, 1)}</td>
          <td>${editableCell('inbody', r.date, 'bmr', r.bmr, 0)}</td>
          <td>${fmt(r.fatPctMA,2)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="note-box" style="margin-top:10px;">셀을 탭하면 바로 수정할 수 있어요. 입력 후 엔터 또는 다른 곳을 누르면 저장돼요.</div>
  </div>`;
}

/* ---------- 일별 기록 ---------- */
function renderLog(){
  const byDate = arr => Object.fromEntries(arr.map(r=>[r.date,r]));
  const groupByDate = arr => arr.reduce((acc,r)=>{ (acc[r.date]=acc[r.date]||[]).push(r); return acc; }, {});
  const ib = byDate(state.inbody), wk = groupByDate(state.workouts), ml = byDate(state.meals);
  const dates = [...new Set([...state.inbody.map(r=>r.date), ...state.workouts.map(r=>r.date), ...state.meals.map(r=>r.date)])].sort((a,b)=>b.localeCompare(a));
  if(dates.length===0) return `<div class="empty-state">아직 기록이 없습니다. 상단의 '기록 추가'로 첫 기록을 남겨보세요.</div>`;

  const ibSorted = sortedInbody();
  const prevOf = (date) => { const idx = ibSorted.findIndex(r=>r.date===date); return idx>0 ? ibSorted[idx-1] : null; };

  const weeks = {};
  dates.forEach(d => { const wkKey = isoWeekKey(d); (weeks[wkKey]=weeks[wkKey]||[]).push(d); });
  const weekKeys = Object.keys(weeks).sort((a,b)=>b.localeCompare(a));

  return weekKeys.map(wkKey => {
    const wDates = weeks[wkKey].sort((a,b)=>b.localeCompare(a));
    const wInbody = wDates.map(d=>ib[d]).filter(Boolean);
    const wMeals = wDates.map(d=>ml[d]).filter(Boolean);
    const wWorkouts = wDates.map(d=>wk[d]).filter(Boolean);
    const weightChange = wInbody.length>=2 ? wInbody[0].weight - wInbody[wInbody.length-1].weight : null;
    const avgCal = wMeals.length ? wMeals.reduce((s,m)=>s+(m.calories||0),0)/wMeals.length : null;
    const avgProtein = wMeals.length ? wMeals.reduce((s,m)=>s+(m.protein||0),0)/wMeals.length : null;
    const wkBmr = (wInbody[0] && wInbody[0].bmr) || (sortedInbody().slice(-1)[0] && sortedInbody().slice(-1)[0].bmr);
    const calLow = wkBmr ? Math.round(wkBmr*1.5-550) : null;
    const calHigh = calLow!=null ? calLow+100 : null;
    const calMid = calLow!=null ? (calLow+calHigh)/2 : null;
    const calAchievePct = (avgCal!=null && calMid) ? Math.round(avgCal/calMid*100) : null;
    const proteinMid = (PROTEIN_TARGET.min+PROTEIN_TARGET.max)/2;
    const proteinAchievePct = avgProtein!=null ? Math.round(avgProtein/proteinMid*100) : null;
    const wkStrength = wDates.filter(d => { const t=classifyDayType(state.workouts,d); return t && (t.type==='근력'||t.type==='둘다'); }).length;
    const wkCardio = wDates.filter(d => { const t=classifyDayType(state.workouts,d); return t && (t.type==='유산소'||t.type==='둘다'); }).length;
    const workoutDays = new Set(wDates.filter(d => { const t=classifyDayType(state.workouts,d); return t && t.type!=='휴식'; })).size;
    const endLabel = dLabel(wDates[wDates.length-1]), startLabel = dLabel(wDates[0]);

    return `<div class="week-block">
      <div class="week-head">
        <div class="week-title">${endLabel} – ${startLabel}</div>
        <div class="week-chips">
          ${weightChange!=null ? `<span class="chip ${weightChange<=0?'good':'warn'}">체중 ${weightChange>0?'+':''}${fmt(weightChange)}kg</span>` : ''}
          ${avgCal!=null ? `<span class="chip">평균 칼로리 섭취 ${fmt(avgCal,0)}kcal${calAchievePct!=null?` (달성률 ${calAchievePct}%)`:''}</span>` : ''}
          ${avgProtein!=null ? `<span class="chip">평균 단백질 ${fmt(avgProtein,0)}g${proteinAchievePct!=null?` (달성률 ${proteinAchievePct}%)`:''}</span>` : ''}
          <span class="chip">운동횟수 ${workoutDays}일 (근력 ${Math.round(wkStrength/3*100)}% 달성 ${wkStrength}/3회, 유산소 ${Math.round(wkCardio/3*100)}% 달성 ${wkCardio}/3회)</span>
        </div>
      </div>
      <div class="card" style="padding:4px 16px;">
        ${wDates.map(date => dayRow(date, ib[date], wk[date], ml[date], prevOf(date))).join('')}
      </div>
    </div>`;
  }).join('');
}

function dayRow(date, i, wArr, m, prev){
  const target = i && i.bmr ? Math.round(i.bmr*1.5-550) : null;
  const proteinTarget = PROTEIN_TARGET.min;

  let ibCol = `<span class="empty">기록 없음</span>`;
  if(i){
    const wDelta = prev ? i.weight - prev.weight : null;
    const fDelta = prev ? i.fatPct - prev.fatPct : null;
    ibCol = `체중 <b class="mono">${fmt(i.weight)}kg</b>${deltaSpan(wDelta,'kg')}
      <br>골격근 <b class="mono">${fmt(i.muscle)}kg</b> · 체지방 <b class="mono">${fmt(i.fat)}kg</b>
      <br>체지방률 <b class="mono" style="color:var(--c-fatpct)">${fmt(i.fatPct)}%</b>${deltaSpan(fDelta,'%p')}`;
  }
  let wkCol = `<span class="empty">기록 없음</span>`;
  if(wArr && wArr.length){
    wkCol = wArr.map(w => `${esc(w.name)}<br><span class="dim">${esc(w.part)}</span>${w.volume?` · ${esc(w.volume)}`:''}${w.calories?` · ${w.calories}kcal`:''}`).join('<hr style="border:none;border-top:1px dashed var(--border);margin:6px 0;">');
  }
  let mlCol = `<span class="empty">기록 없음</span>`;
  if(m){
    const calHit = target ? m.calories<=target+80 : null;
    const proHit = proteinTarget ? m.protein>=proteinTarget : null;
    mlCol = `${m.calories}kcal${target?`<span class="badge ${calHit?'hit':'miss'}">${calHit?'목표 충족':'목표 초과'}</span>`:''}
      <br>단백질 ${m.protein}g${proteinTarget?`<span class="badge ${proHit?'hit':'miss'}">${proHit?'충분':'부족'}</span>`:''}${m.carbs?` · 탄수 ${m.carbs}g`:''}
      ${m.note?`<br><span class="dim">${esc(m.note)}</span>`:''}`;
  }

  return `<div class="day-row">
    <div class="day-date">${date.slice(5)}<span class="dow">${dowLabel(date)}</span></div>
    <div class="day-cols">
      <div class="day-col"><div class="k">인바디</div>${ibCol}</div>
      <div class="day-col"><div class="k">운동</div>${wkCol}</div>
      <div class="day-col"><div class="k">식단</div>${mlCol}</div>
    </div>
  </div>`;
}
function deltaSpan(delta, unit){
  if(delta===null || delta===undefined || isNaN(delta)) return '';
  if(Math.abs(delta) < 0.05) return `<span class="delta">–</span>`;
  const dir = delta>0 ? 'up' : 'down';
  const arrow = delta>0 ? '▲' : '▼';
  return `<span class="delta ${dir}">${arrow}${fmt(Math.abs(delta), unit==='%p'?2:1)}${unit}</span>`;
}

function renderGoal(){
  const {last, ma} = computeInsights();
  if(!last) return `<div class="empty-state">아직 기록이 없습니다.</div>`;
  const recentMA = ma.slice(-7);
  const maTrendDelta = recentMA.length>=2 ? recentMA[recentMA.length-1].fatPctMA - recentMA[0].fatPctMA : 0;
  const muscleAssess = computeMuscleAssessment(sortedInbody()[0], last);

  const other = last.weight - last.muscle - last.fat;
  const targetMuscle = Math.max(last.muscle, MUSCLE_BASELINE);

  const calcRows = FAT_GOALS.map(g => {
    const t = g.pct/100;
    const targetFat = t*(other+targetMuscle) / (1-t);
    const targetWeight = other + targetMuscle + targetFat;
    const fatLossNeeded = last.fat - targetFat;
    const muscleGainNeeded = targetMuscle - last.muscle;
    const achieved = last.fatPct <= g.pct;
    return {g, targetFat, targetWeight, targetMuscle, fatLossNeeded, muscleGainNeeded, achieved};
  });

  return `
    <section class="card">
      <div class="section-label good">${secNum('03')}목표 현황</div>
      <h3 class="hero-heading">체지방률 ${fmt(START_FAT_PCT)}% → 현재 ${fmt(last.fatPct)}%</h3>
      <div class="ring-grid">
        ${FAT_GOALS.map(g=>{
          const totalDist = START_FAT_PCT-g.pct;
          const progressed = Math.min(100, Math.max(0, ((START_FAT_PCT-last.fatPct)/totalDist)*100));
          const done = last.fatPct<=g.pct;
          const remain = Math.max(0, last.fatPct-g.pct);
          return `<div class="ring-card">
            ${ringSVG(progressed, done)}
            <div class="ring-label">${g.label} · ${g.pct}%</div>
            <div class="ring-status ${done?'done':'pending'}">
              ${done ? '달성 완료' : `${fmt(remain)}%p 남음`}
            </div>
          </div>`;
        }).join('')}
        ${(() => {
          // [2026-07-17 추가] 골격근 보존 현황: 시작 기준값(33.2kg) 고정이 아니라
          // 가장 최근 인바디 골격근량(last.muscle)을 기준값과 직접 비교해서 보여줌.
          // targetMuscle 표(구간표)는 current<baseline일 때 33.2kg 고정으로만 보여서
          // "지금 실제로 얼마나 보존됐는지"가 안 보인다는 피드백으로 추가된 게이지.
          const muscleProgress = Math.min(100, Math.max(0, (last.muscle/MUSCLE_BASELINE)*100));
          const muscleDone = last.muscle >= MUSCLE_BASELINE;
          const muscleRemain = Math.max(0, MUSCLE_BASELINE-last.muscle);
          return `<div class="ring-card">
            ${ringSVG(muscleProgress, muscleDone)}
            <div class="ring-label">골격근 보존 · 현재 ${fmt(last.muscle)}kg</div>
            <div class="ring-status ${muscleDone?'done':'pending'}">
              ${muscleDone ? '기준 유지/초과' : `기준(${fmt(MUSCLE_BASELINE)}kg) 대비 -${fmt(muscleRemain)}kg`}
            </div>
          </div>`;
        })()}
      </div>
      <div class="note-box" style="margin-top:14px;">
        골격근 보존 게이지는 시작 기준값(${fmt(MUSCLE_BASELINE)}kg) 대비 <b>최근 인바디 실측 골격근량(${fmt(last.muscle)}kg)</b>이 얼마나 유지됐는지를 매 인바디 측정마다 갱신해서 보여줍니다. 체중감량 대비 손실 비율(SURMOUNT-1 0.51 기준) 판단은 아래 가이드 02번과 대시보드를 함께 참고하세요.
      </div>
    </section>

    <section class="card">
      <div class="section-label">${secNum('04')}목표 달성에 필요한 변화량 (추정)</div>
      <div style="overflow-x:auto;">
        <table class="data-table calc-table">
          <thead><tr><th style="text-align:left">목표</th><th>목표 체지방률</th><th>필요 체지방 감량</th><th>필요 골격근량</th><th>골격근 증가분</th><th>예상 목표체중</th></tr></thead>
          <tbody>
            ${calcRows.map(r => `<tr>
              <td>${r.g.label}</td>

    <section class="card">

      <div class="guide-list">
        ${(() => {
          const targetLow = Math.round(last.bmr*1.5-550), targetHigh = targetLow+100;
          const midCal = Math.round((targetLow+targetHigh)/2);
          const proteinMid = Math.round((PROTEIN_TARGET.min+PROTEIN_TARGET.max)/2);
          const proteinKcal = proteinMid*4;
          const remainKcal = midCal - proteinKcal;
          const carbG = Math.round(remainKcal*0.55/4);
          const fatG = Math.round(remainKcal*0.45/9);
          return `<div class="guide-item"><span class="guide-num">01</span>칼로리 목표 = 최신 BMR × 1.5 − 550kcal 공식을 유지하세요. 현재 BMR ${last.bmr}kcal 기준 <b>${targetLow}~${targetHigh}kcal</b>가 권장 범위예요. 매크로는 단백질 ${PROTEIN_TARGET.min}~${PROTEIN_TARGET.max}g 기준으로 잡으면 대략 <b>단백질 ${proteinMid}g · 탄수화물 ${carbG}g · 지방 ${fatG}g</b>(약 ${midCal}kcal)이 기준값이에요.</div>`;
        })()}
        <div class="guide-item"><span class="guide-num">02</span>tirzepatide DEXA 임상연구(SURMOUNT-1, Look et al. 2025, Diabetes Obes Metab)의 실측치로 계산하면 체중 -21.3% 대비 제지방량 -10.9%, 비율 0.51이에요. 지금 정희님의 골격근 비율은 ${muscleAssess.muscleLoss<=0 ? '0 (감소 없음)' : fmt(muscleAssess.ratio,2)}로 ${muscleAssess.tone==='good' ? '0.51보다 뚜렷이 낮아 근육을 잘 보존하고 있어요' : muscleAssess.tone==='neutral' ? '0.51 이내로 임상 기준 범위 안이에요' : '0.51을 넘어 저항운동 볼륨과 단백질 섭취를 점검할 필요가 있어요'}. 이 비율을 0.51 아래로 유지하는 게 목표예요.</div>
        <div class="guide-item"><span class="guide-num">03</span>체지방률의 일일 변화는 BIA 특성상 수분·글리코겐 상태에 따라 흔들릴 수 있습니다. 하루 단위 반등에 일희일비하지 말고 7일 이동평균으로 추세를 판단하세요. 현재 추세는 ${maTrendDelta<=0?'하락(개선) 중':'상승(정체) 중'}입니다.</div>

      </div>
    </section>

}
function ringSVG(pct, done){
  const r=42, c=2*Math.PI*r, off = c*(1-pct/100);
  const gid = 'ring'+Math.random().toString(36).slice(2,7);
  return `<svg width="110" height="110" viewBox="0 0 110 110">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:var(--c-ring-from)"/>
      <stop offset="100%" style="stop-color:${done?'var(--c-ring-good)':'var(--c-ring-warn)'}"/>
    </linearGradient></defs>
    <circle cx="55" cy="55" r="${r}" fill="none" style="stroke:var(--c-track)" stroke-width="10"/>
    <circle cx="55" cy="55" r="${r}" fill="none" stroke="url(#${gid})" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 55 55)"/>
    <text x="55" y="60" text-anchor="middle" class="ring-num" font-size="18">${Math.round(pct)}%</text>
  </svg>`;
}

function mergeByDate_(existing, incoming){
  const byDate = Object.fromEntries(existing.map(r=>[r.date,r]));
  (incoming||[]).forEach(r => { if(r && r.date) byDate[r.date] = {...byDate[r.date], ...r}; });
  return Object.values(byDate);
}
// 운동은 하루에 여러 건이 정상(예: 근력+유산소, 유산소 2회)이라 날짜만으로 병합하면 안 됨.
// 날짜+이름을 키로 써서 같은 세션이면 갱신, 다르면 별도 항목으로 추가.
function mergeWorkoutsByDate_(existing, incoming){
  const result = [...existing];
  (incoming||[]).forEach(r => {
    if(!r || !r.date) return;
    const idx = result.findIndex(e => e.date===r.date && e.name===r.name);
    if(idx>=0) result[idx] = {...result[idx], ...r};
    else result.push(r);
  });
  return result;
}
// 2026-07-16 추가: 식단도 운동처럼 하루 여러 건이 정상(아침/점심/저녁/간식)인데 mergeByDate_는
// 날짜당 1건으로 가정해 뒤에 올린 끼니가 앞선 끼니를 덮어쓰는 문제가 있었음(실제 발생 사례).
// 날짜+note를 키로 써서 같은 끼니(note 동일)면 갱신, 다른 끼니면 별도 항목으로 추가.
function mergeMealsByDate_(existing, incoming){
  const result = [...existing];
  (incoming||[]).forEach(r => {
    if(!r || !r.date) return;
    const idx = result.findIndex(e => e.date===r.date && (e.note||'')===(r.note||''));
    if(idx>=0) result[idx] = {...result[idx], ...r};
    else result.push(r);
  });
  return result;
}

let syncing = false;
let syncUiStatus = {phase:'idle', at:null, elapsedSec:0}; // 'idle'|'syncing'|'done'|'error' — 버튼 옆 동기화 상태 표시용
let syncTimerHandle = null;
function startSyncTimer(){
  clearInterval(syncTimerHandle);
  syncTimerHandle = setInterval(() => {
    if(syncUiStatus.phase!=='syncing'){ clearInterval(syncTimerHandle); syncTimerHandle=null; return; }
    syncUiStatus = {...syncUiStatus, elapsedSec: (syncUiStatus.elapsedSec||0)+1};
    paintSyncBadge();
  }, 1000);
}
function stopSyncTimer(){ clearInterval(syncTimerHandle); syncTimerHandle=null; }
// 2026-07-17 추가: Apps Script 응답이 느리거나 응답 자체가 없을 때 무한정 매달리지 않도록 타임아웃 부여.
// 타임아웃 시 명확한 에러로 실패 처리(조용히 멈춰있지 않도록).
async function fetchWithTimeout(url, opts, timeoutMs){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try{
    return await fetch(url, {...(opts||{}), signal: controller.signal});
  }catch(e){
    if(e && e.name === 'AbortError'){
      const err = new Error(`서버 응답이 ${Math.round(timeoutMs/1000)}초 넘게 없어 시간 초과됐어요. 네트워크 상태를 확인하거나 잠시 후 다시 시도해주세요.`);
      err.isTimeout = true;
      throw err;
    }
    throw e;
  } finally { clearTimeout(timer); }
}
// 2026-07-17 재조정: 실측 동기화 소요시간이 43초까지 나와서 45초는 너무 빠듯함 → 60초로 상향.
const SYNC_TIMEOUT_MS = 60000;
// 2026-07-17 추가: 과거 데이터는 이미 이전 동기화로 시트에 반영되어 있고 보통 안 바뀌므로,
// 매번 전체 이력을 다 보내지 않고 "최근 N일치 + 오늘 하루 앱 내 직접 수정분"만 전송해 페이로드를
// 줄임. 오래된 기록을 고쳐야 할 때(예: 중복행 정리)는 지금처럼 Google Sheet에서 직접 수정하는
// 방식을 계속 사용(이 최적화와 무관하게 항상 가능).
const SYNC_RECENT_DAYS = 14;
function recentWindow_(arr){
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - SYNC_RECENT_DAYS);
  const cutoffStr = toLocalISO(cutoff);
  return (arr||[]).filter(r => r.date >= cutoffStr);
}
async function cloudSync(silent){
  try{
    const url = (localStorage.getItem(LS_KEYS.cloudurl)||'').trim();
    if(!url){ if(!silent) alert('먼저 클라우드 동기화 URL을 저장해주세요.'); return; }
    if(syncing){
      // 앱 열릴 때 자동으로 도는 백그라운드 동기화(silent)가 아직 끝나기 전에 사용자가
      // "지금 동기화"를 누르는 경우에도, 실제로 동기화가 진행 중인 상태이니 배지를 보여줌.
      if(!silent){ syncUiStatus = {phase:'syncing', at:null, elapsedSec: syncUiStatus.elapsedSec||0}; paintSyncBadge(); }
      return;
    }
    syncing = true;
    // 2026-07-17 재작성: render() 전체 재구성 타이밍에 기대지 않고, 클릭한 바로 그 자리에서
    // paintSyncBadge()로 배지 DOM을 직접 즉시 갱신 — 실기기에서 "배지가 안 뜬다"는 문제가
    // render()의 비동기적 리페인트 타이밍에 기인했을 가능성이 높아 근본적으로 다른 방식으로 교체.
    if(!silent){
      syncUiStatus = {phase:'syncing', at:null, elapsedSec:0}; startSyncTimer(); paintSyncBadge();
      // 브라우저가 실제로 이 배지 갱신을 화면에 그릴 기회를 확실히 갖도록 두 번의 rAF로 강제 양보.
      // (동기적으로 DOM은 바뀌었어도, 다음 코드가 곧바로 이어지면 페인트가 씹힐 가능성을 방지)
      if(typeof requestAnimationFrame === 'function'){
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      }
    }
    try{
      // 1) 로컬 데이터를 시트로 전송 (text/plain으로 보내 CORS preflight 회피). 최근 N일치만 전송해 페이로드 축소.
      await fetchWithTimeout(url, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({
          inbody: recentWindow_(state.inbody), workouts: recentWindow_(state.workouts), meals: recentWindow_(state.meals),
          aiAnalysis: state.aiNote ? state.aiNote.text : null,
          aiAnalysisDate: state.aiNote ? state.aiNote.date : null,
        })
      }, SYNC_TIMEOUT_MS);
      // 2) 시트의 최신 데이터를 가져와 병합 (다른 기기·Claude가 넣은 데이터 포함)
      const res = await fetchWithTimeout(url + (url.includes('?') ? '&' : '?') + 'ts=' + Date.now(), {}, SYNC_TIMEOUT_MS);
      const data = await res.json();
      state.inbody = mergeByDate_(state.inbody, data.inbody);
      state.workouts = mergeWorkoutsByDate_(state.workouts, data.workouts);
      state.meals = mergeMealsByDate_(state.meals, data.meals);
      state.steps = mergeByDate_(state.steps, data.steps);
      saveArr(LS_KEYS.inbody, state.inbody); saveArr(LS_KEYS.workout, state.workouts); saveArr(LS_KEYS.meal, state.meals);
      saveArr(LS_KEYS.steps, state.steps);
      if(data.aiAnalysis && (!state.aiNote || data.aiAnalysisDate >= state.aiNote.date)){
        state.aiNote = {date: data.aiAnalysisDate || todayISO(), text: data.aiAnalysis, syncedAt: new Date().toISOString()};
        saveAiNote(state.aiNote);
      }
      markUpdated();
      stopSyncTimer();
      if(!silent){ syncUiStatus = {phase:'done', at: new Date().toISOString()}; }
      render(); // 데이터가 실제로 바뀌었으니 여기서는 전체 재구성이 맞음(마지막 갱신 시각 등도 갱신)
    } finally { syncing = false; stopSyncTimer(); }
  }catch(e){
    // render() 등 예상 못한 곳에서 예외가 나도 조용히 묻히지 않고 반드시 사용자에게 보이도록 함
    // (alert는 render 실패와 무관하게 항상 뜸).
    syncing = false;
    stopSyncTimer();
    console.error('cloudSync error', e);
    if(!silent){
      try{
        syncUiStatus = {phase:'error', at: new Date().toISOString(), message: (e && e.isTimeout) ? e.message : ('동기화 실패: ' + (e && e.message ? e.message : '알 수 없는 오류'))};
        paintSyncBadge();
      }catch(e2){
        alert('동기화 중 오류가 발생했습니다: ' + (e && e.message ? e.message : e));
      }
    }
  }
}
function setSyncStatus(msg){
  const el = document.getElementById('sync-status');
  if(el) el.textContent = msg;
}
function saveCloudUrl(){
  const v = document.getElementById('cloud-url-input').value.trim();
  if(v) localStorage.setItem(LS_KEYS.cloudurl, v);
  render();
}

/* =========================================================
   기록 추가 모달
========================================================= */
let modalState = {open:false, kind:'inbody', status:'idle', form:{}, error:''};

function renderModal(){
  const kindLabel = {inbody:'인바디', meal:'식단', workout:'운동'}[modalState.kind];
  let body = '';
  if(modalState.status==='idle'){
    body = `
      <label class="dropzone" for="file-input">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.2"/><path d="M8 6l1.2-2h5.6L16 6"/></svg>
        <span>${kindLabel} 사진 업로드 (자동 인식)</span>
      </label>
      <input id="file-input" type="file" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
      <button class="link-btn" onclick="setManual()">사진 없이 직접 입력</button>
    `;
  } else if(modalState.status==='loading'){
    body = `<div class="loading-box">
      <span class="spin"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9"/></svg></span>
      사진을 분석하는 중...
    </div>`;
  } else if(modalState.status==='review' || modalState.status==='manual'){
    const f = modalState.form;
    body = `
      ${modalState.error ? `<div class="msg-error">${esc(modalState.error)}</div>` : ''}
      ${modalState.status==='review' ? `<div class="msg-good">인식 결과를 확인하고 저장하세요.</div>` : ''}
      ${field('date','날짜 (YYYY-MM-DD)', f.date)}
      ${modalState.kind==='inbody' ? `
        ${field('weight','체중 (kg)', f.weight)}
        ${field('muscle','골격근량 (kg)', f.muscle)}
        ${field('fat','체지방량 (kg)', f.fat)}
        ${field('fatPct','체지방률 (%)', f.fatPct)}
        ${field('bmr','BMR (kcal, 선택)', f.bmr)}
      ` : ''}
      ${modalState.kind==='meal' ? `
        ${field('description','내용 요약', f.description)}
        ${field('calories','칼로리 (kcal)', f.calories)}
        ${field('protein','단백질 (g)', f.protein)}
        ${field('carbs','탄수화물 (g, 선택)', f.carbs)}
      ` : ''}
      ${modalState.kind==='workout' ? `
        <div class="ex-rows">
          ${(modalState.exerciseRows||[]).map((row,i) => `
            <div class="ex-row">
              <input placeholder="종목명" value="${esc(row.name||'')}" oninput="updateExRow(${i},'name',this.value)">
              <select onchange="updateExRow(${i},'part',this.value)">
                <option value="">부위</option>
                ${BODY_PARTS.map(p=>`<option value="${p}" ${row.part===p?'selected':''}>${p}</option>`).join('')}
                <option value="유산소" ${row.part==='유산소'?'selected':''}>유산소</option>
              </select>
              <input type="number" placeholder="세트" value="${row.sets??''}" oninput="updateExRow(${i},'sets',this.value)">
              <input type="number" placeholder="횟수" value="${row.reps??''}" oninput="updateExRow(${i},'reps',this.value)">
              <input type="number" placeholder="무게kg" value="${row.weight??''}" oninput="updateExRow(${i},'weight',this.value)">
              <button class="ex-row-del" onclick="removeExRow(${i})">✕</button>
            </div>`).join('')}
        </div>
        <button class="link-btn" onclick="addExRow()">+ 종목 추가</button>
        <div class="note-box" style="margin:2px 0 0;">종목을 추가하면 세트·무게 기준으로 부위별 회복상태와 볼륨이 자동 계산돼요. 비워두면 아래 요약 입력으로 기록됩니다.</div>
        ${field('name','운동 내용 요약 (상세입력 없을 때만 사용)', f.name)}
        ${field('part','부위 (상세입력 없을 때만 사용)', f.part)}
        ${field('volume','볼륨 (kg, 선택 — 상세입력 시 자동계산)', f.volume)}
        ${field('calories','소모 칼로리 (kcal, 선택)', f.calories)}
        ${field('note','비고 (선택)', f.note)}
      ` : ''}
      <button class="btn-save" onclick="saveRecord()">저장</button>
    `;
  }
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this) closeModal()">
      <div class="modal">
        <div class="modal-head">
          <h3>기록 추가</h3>
          <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
          <div class="kind-tabs">
            ${['inbody','meal','workout'].map(k=>`<button class="${modalState.kind===k?'active':''}" onclick="setKind('${k}')">${({inbody:'인바디',meal:'식단',workout:'운동'})[k]}</button>`).join('')}
          </div>
          ${body}
        </div>
      </div>
    </div>
  `);
}
function field(key,label,val){
  return `<div class="field"><label>${label}</label><input data-field="${key}" value="${val!=null?esc(val):''}" oninput="modalState.form['${key}']=this.value"></div>`;
}
function setKind(k){ modalState.kind=k; modalState.status='idle'; modalState.form={date:todayISO()}; modalState.error=''; modalState.exerciseRows = k==='workout' ? [{}] : []; refreshModal(); }
function setManual(){ modalState.status='manual'; modalState.form={date:todayISO()}; if(modalState.kind==='workout' && !modalState.exerciseRows) modalState.exerciseRows=[{}]; refreshModal(); }
function addExRow(){ modalState.exerciseRows = modalState.exerciseRows||[]; modalState.exerciseRows.push({}); refreshModal(); }
function removeExRow(i){ modalState.exerciseRows.splice(i,1); refreshModal(); }
function updateExRow(i,field,val){ modalState.exerciseRows[i][field] = val; }
function refreshModal(){ document.getElementById('modal-backdrop')?.remove(); renderModal(); }

async function handleFile(file){
  if(!file) return;
  if(!localStorage.getItem(LS_KEYS.apikey)){
    modalState.status='manual'; modalState.error='사진 자동 인식은 지원하지 않아요. 아래에 값을 직접 입력해주세요.'; modalState.form={date:todayISO()};
    refreshModal(); return;
  }
  modalState.status='loading'; refreshModal();
  try{
    const base64 = await fileToBase64(file);
    const result = await recognizeImage(base64, file.type||'image/jpeg', modalState.kind);
    modalState.form = {date: result.date || todayISO(), ...result};
    modalState.status='review'; modalState.error='';
  }catch(e){
    modalState.status='manual'; modalState.error='이미지 인식에 실패했습니다. 값을 직접 입력해주세요.'; modalState.form={date:todayISO()};
  }
  refreshModal();
}

function saveRecord(){
  const f = modalState.form;
  if(!f.date){ alert('날짜를 입력해주세요.'); return; }
  if(modalState.kind==='inbody'){
    const rec = {date:f.date, weight:num(f.weight), muscle:num(f.muscle), fat:num(f.fat), fatPct:num(f.fatPct), bmr:f.bmr?num(f.bmr):null};
    state.inbody = [...state.inbody.filter(r=>r.date!==rec.date), rec];
    saveArr(LS_KEYS.inbody, state.inbody);
  } else if(modalState.kind==='meal'){
    const rec = {date:f.date, calories:num(f.calories), protein:num(f.protein), carbs:f.carbs?num(f.carbs):null, note:f.description||f.note||''};
    state.meals = [...state.meals.filter(r=>r.date!==rec.date), rec];
    saveArr(LS_KEYS.meal, state.meals);
  } else {
    const validRows = (modalState.exerciseRows||[]).filter(r => r.name && r.name.trim());
    let rec;
    if(validRows.length){
      const exercises = validRows.map(r => ({
        name:r.name.trim(), part:r.part||inferPartFromName(r.name), sets:num(r.sets), reps:num(r.reps), weight:num(r.weight)
      }));
      const totalVol = exercises.reduce((s,e)=> s + ((e.weight||0)*(e.sets||0)*(e.reps||0)), 0);
      const parts = [...new Set(exercises.map(e=>e.part).filter(Boolean))];
      rec = {
        date:f.date,
        name: exercises.map(e=>e.name).join(' / '),
        part: parts.join('+') || (f.part||''),
        volume: totalVol>0 ? `${totalVol.toLocaleString()}kg` : (f.volume||null),
        calories: f.calories?num(f.calories):null,
        note: f.note||'',
        exercises
      };
    } else {
      rec = {date:f.date, name:f.name||'', part:f.part||'', volume:f.volume||null, calories:f.calories?num(f.calories):null, note:f.note||''};
    }
    state.workouts = [...state.workouts.filter(r=>r.date!==rec.date), rec];
    saveArr(LS_KEYS.workout, state.workouts);
  }
  markUpdated();
  closeModal();
}
function inferPartFromName(name){
  if(!name) return '';
  if(EXERCISE_PART_MAP[name]) return EXERCISE_PART_MAP[name];
  const found = Object.keys(EXERCISE_PART_MAP).find(k => name.includes(k) || k.includes(name));
  return found ? EXERCISE_PART_MAP[found] : '';
}
function num(v){ const n = Number(v); return isNaN(n) ? null : n; }

render();
// 2026-07-17 제거: 앱 열릴 때마다 자동으로 도는 백그라운드(silent) 동기화가 25초+ 걸리다 보니,
// 이 자동 동기화와 사용자의 수동 "지금 동기화" 클릭이 충돌해서 배지가 안 뜨거나 늦게 뜨는
// 문제가 반복 재발했음(여러 차례 수정 시도에도 근본 원인이 이거였음). 이제 동기화는
// "지금 동기화" 버튼을 눌렀을 때만 실행됨 — 예측 가능하게 만들어 충돌 자체를 제거.

// PWA: Service Worker 등록 (홈 화면 설치 + 정적 파일 오프라인 캐싱용, 구글 동기화 호출은 캐싱 제외됨)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch((err) => {
      console.warn('Service Worker 등록 실패:', err);
    });
  });
}
